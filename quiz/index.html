<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>症状別 食事指導クイズ｜成竹鍼灸整骨院グループ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f7f6f3;color:#1a1a1a;min-height:100vh;padding:16px}
#app{max-width:680px;margin:0 auto}
.hdr{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr h1{font-size:16px;font-weight:600;color:#1a1a1a}
.hdr p{font-size:12px;color:#666;margin-top:3px}
.cat-badge{font-size:11px;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:500}
.cat-w{background:#e6f7f0;color:#1a6644;border:1px solid #b3e0cd}
.cat-m{background:#fef3e2;color:#8a5a00;border:1px solid #f5d9a0}
.pb-wrap{background:#f0ede8;border-radius:99px;height:5px;margin-top:12px}
.pb{height:5px;border-radius:99px;transition:width .4s}
.pb-w{background:#1a9e70}.pb-m{background:#c87d00}
.stats{display:flex;gap:12px;margin-top:7px}
.stat{font-size:12px;color:#666}
.stat b{color:#1a1a1a;font-weight:600}
.q-card{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:18px 20px;margin-bottom:12px}
.diff-badge{font-size:11px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;font-weight:500}
.diff-combo{background:#fde8e2;color:#9b2e14;border:1px solid #f5b8a8}
.diff-bensho{background:#fef3e2;color:#8a5a00;border:1px solid #f5d9a0}
.diff-why{background:#e6f0fb;color:#1a4a8a;border:1px solid #b3ccf0}
.q-sym{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:10px;background:#f5f4f0;color:#555;margin-left:6px}
.q-num{font-size:12px;color:#888;font-weight:600;margin-bottom:6px}
.q-text{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.65;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.cbtn{display:block;width:100%;text-align:left;padding:12px 15px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13.5px;cursor:pointer;line-height:1.55;transition:background .12s,border-color .12s;font-family:inherit}
.cbtn:hover:not(:disabled){background:#f5f4f0;border-color:#bbb}
.cbtn.correct{border:2px solid #1a9e70;background:#eaf7f2;color:#0a4a30}
.cbtn.wrong{border:2px solid #d85a30;background:#fde8e2;color:#6b1a08}
.cbtn.reveal{opacity:0.4;cursor:default}
.cbtn:disabled{cursor:default}
.lbl{display:inline-block;font-size:11px;font-weight:600;padding:1px 6px;border-radius:3px;margin-right:7px;min-width:18px;text-align:center}
.la{background:#0c447c;color:#e6f1fb}.lb{background:#2d6010;color:#eaf3de}.lc{background:#633806;color:#faeeda}.ld{background:#712b13;color:#faece7}
.fb{border-radius:10px;border:1px solid #e0ddd8;overflow:hidden;margin-bottom:12px}
.fb-hdr{display:flex;align-items:center;gap:8px;padding:10px 15px;background:#f7f6f3}
.fb-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.fb-ok{background:#e6f7f0;color:#1a6644}.fb-ng{background:#fde8e2;color:#9b2e14}
.fb-title{font-size:13.5px;font-weight:600;line-height:1.45}
.exp-grid{display:grid;grid-template-columns:1fr 1fr}
.exp-col{padding:12px 15px;border-top:1px solid #e0ddd8}
.exp-col+.exp-col{border-left:1px solid #e0ddd8}
.exp-lbl{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:7px}
.el-t{background:#e6f7f0;color:#1a6644}.el-w{background:#e6f0fb;color:#1a4a8a}
.exp-text{font-size:12.5px;color:#333;line-height:1.7}
.ev-row{padding:10px 15px;border-top:1px solid #e0ddd8;font-size:12px;color:#666;line-height:1.65}
.ev-row b{color:#333;font-weight:600}
.wp-row{padding:10px 15px;border-top:1px solid #e0ddd8;background:#fffbf0;font-size:12.5px;color:#7a5200;line-height:1.7}
.wp-row b{color:#6a4400;font-weight:600}
.next-btn{width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-weight:600;transition:background .12s;font-family:inherit}
.next-btn:hover{background:#f5f4f0}
.result{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:32px 20px;text-align:center}
.rscore{font-size:56px;font-weight:700;color:#1a1a1a;line-height:1}
.rlbl{font-size:13px;color:#666;margin-top:6px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.rcard{background:#f7f6f3;border-radius:8px;padding:12px;text-align:center}
.rcard-n{font-size:24px;font-weight:700}.rcard-l{font-size:11px;color:#666;margin-top:3px}
.rmsg{font-size:14px;color:#333;line-height:1.75;margin-top:16px;padding:16px;background:#f7f6f3;border-radius:8px;text-align:left}
.restart{padding:12px 32px;border-radius:8px;border:1px solid #ccc;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer;font-weight:600;margin-top:20px;font-family:inherit;transition:opacity .12s}
.restart:hover{opacity:0.85}
.logo{text-align:center;font-size:11px;color:#aaa;margin-top:16px;padding-bottom:8px}
@media(max-width:520px){.exp-grid{grid-template-columns:1fr}.exp-col+.exp-col{border-left:none;border-top:1px solid #e0ddd8}.rgrid{grid-template-columns:1fr 1fr}}
</style>
</head>

<script>
const QS=[
{cat:"女性",sym:"冷えのぼせ",diff:"bensho",q:"手足は冷えているのに顔がのぼせる「冷えのぼせ」タイプの患者さまに最も適した食材の組み合わせはどれですか？",choices:["ラム肉＋生姜＋シナモン（強力に体を温める）","スイカ＋緑豆＋薄荷（清熱のみ集中）","山芋＋黒豆＋くるみ（補腎陽のみ）","なつめ＋クコの実＋菊花（補血しながら虚熱を清める）"],ans:3,trad:"「冷えのぼせ」は「陰虚＋血虚」または「上熱下寒」のパターン。ラム肉など強力な温め食材は上部の熱をさらに悪化させる。クコ・なつめで補血滋陰し、菊花で虚熱を清することで上熱と下寒のバランスを同時に整える。",west:"末梢血管収縮（冷え）と中枢の熱調節障害（のぼせ）が共存する状態で、エストロゲン低下期に典型的。強い末梢温め成分は中枢性の血管拡張を誘発し、のぼせを悪化させる可能性がある。",ev:"冷えのぼせの自律神経機序の研究（自律神経学会誌 2014）で末梢血管収縮と中枢性体温調節の解離が確認されている。",wp:"なつめは「ドライデーツ」（製菓コーナー）で彳用できます。クコの実はカルディや業務スーパーで入手しやすくなっています。菊花は「カモミールティー」（ティーバッグ）が手軽な代用品になります。"},
{cat:"女性",sym:"月経痛（寒凝血瘀）",diff:"bensho",q:"経血が「暗紫色でレバー状の塊が多く、温めると楽になる」月経痛の患者さまに最も適した食事㘇導はどれですか？",choices:["生姜・シナモン・どン・モン・玫瑰花・黒砂糖を用いた温経散寒・活血化瘀の食事","緑茶・ゴーヤ・セロリなど清熱食材を中心にする","カルシウムのみをサプリで補充する","オメガ6（ひまわり油）を大量に摂取する"],ans:0,trad:"「経血が暗紫色・塊あり・温めると楽」は「寒凝血瘀証」の典型。温性食材（生姜・シナモン）で寒を散らし、活血化瘀（玫瑰花・黒砂糖）で瘀血を動かすことが基本治則。清熱食材は「寒」をさらに増やし逆効果になる。",west:"子宮血管収縮と寒冷刺激がPGF2α産生と組み合わさり月経痛を悪化させる。温熱刺激は子宮の血流改善とPGF2αによる収縮緩和の両方に働く。ショウガオールは末梢循環改善と抷炎症作用を持つ。",ev:"温め療法とイブプロフェンを比較したRCT（Journal of Obstetrics and Gynaecology 2012）で同等の鎮痛効果が確認されている。",wp:"生姜はチューブタイプで十分です。玫瑰花は「ローズヒップティー」（ティーバッグ）で平軽に代用できます。黒砂糖・シナモンパウダーはスーパーの製菓コーナーで購入できます。"},
{cat:"女性",sym:"PMS（肝気鬱結）",diff:"combo",q:"月経前になるとイライラ・乳房張痛・腹部膨満感が強くなる患者さまへの食事指導として最も適切なのはどれですか？",choices:["月経前は塩分を増やして水分を保持する","月経前は赤身肉だけで鉄を補う","玫瑰花・陳皮・セロリ・アボカドなど疏肝理気の食材と、ビタミンB6・マグネシウムを意識して摂る","高カロリー食で気分を上げる"],ans:2,trad:"PMS（月経前症候群）は「肝気鬱結」が典型。月経前は肝気が盛んになりやすく気の流れが滞りやすい。玫瑰花・陳皮など理気疏肝の食材と香りの強いハーブ（ジャスミン・薄荷）の組み合わせが有効。塩分増加は浮腫・膨満感を悪化させる。",west:"ビタミンB6はドーパミン・セロトニン合成に関与しPMSの気分症状を改善する。マグネシウムは月経前の浮腫・乳房張痛・頭闛を軽減する。塩分過剰は水分貯留を促進しPMSを悪化させる。",ev:"B6とPMSのメタ解析（BMJ 1999）で気分・身体症状の改善が確認されている。マグネシウムのRCT（Obstetrics & Gynecology 1991）でも月経前症状の有意な軽減が示されている。",wp:"陳皮はみかんの皮を天日干しにしたもので手作りできます。玫瑰花は「ローズヒップティー」が代用品になります。セロリ・アボカドはスーパーで通年で購入可能です。"},
{cat:"女性",sym:"月経不順（血虚の弁証）",diff:"bensho",q:"月経周期が40日以上に延長し、経血量が少なく色が薄い。顔色が白く動悸・目のかすみもある患者さまの弁証と食事として最も正しいのはどれですか？",choices:["気滞血瘀→セロリ・ターメリック","血虚証→なつめ・クコの実・ほうれん草・レバー・黒ゴマ","湿熊下注→はとむぎ・緑豆","腎陽虚→ラム肉・シナモン・黒豆"],ans:1,trad:"「経血量少・色薄・顔白・動悸・目のかすみ」は「血虚証」の典型。補血の基本食材（なつめ・クコ・黒ゴマ・レバー）を用いる。気滞血瘀なら経血は暗紫色で善あり、腎陽虚なら強い冷え・腰の重だるさが顕著という点で区別する。",west:"鉄欠乏性貧血による月経量減少・動悸・眼精疲労はまさに血虚証と重なる。鉄・葉酸・B12不足は卵巣機能に影響し月経周期を延長させる。ヘム鉄＋ビタミンCの組み合わせで吸収率が最大化される。",ev:"鉄次乏と月経異常の関連は婦人科内分泌学会ガイドラインに明記されている。",wp:"ほうれん草・小松菜・豉レバーはスーパーで平に入る代表的な補血食材です。なつめはドライデーツ（製菓コーナー）で彳用できます。黒ゴマはすりごまタイプが使いやすくスーパーで年で凅入できます。"},
{cat:"女性",sym:"更年期（エクオール）",diff:"why",q:"毎日豆乳を飲んでいるが更年期のほてり・寝汗に効果が出ないと相請された場合の追加アドバイスとして最も適切なのはどれですか？",choices:["豆乳を倍量飲む","動物性脄肪を増やす","カフェインで眠気を抑える","納豆・味噌などの発酵大豆食品に切り替え、黒豆・山芋・くるみ・百合根を組み合わせる"],ans:3,trad:"腎陰虚証のほてり・寝汗に豆乳単独では不十分。食薬の「相須相使（相乗効果）」を意識した組み合わせが東洋医学の基本。黒豆・山芋・くるみ・百合根を複合的に用いることで滋陰補腎の効果が高まる。",west:"大豆イソフラボンはエクオールに腸内変換されることで活性化する。エクオール産生には腸内細菌が必須で、睹릵大豆食品（納豆・味噌）は腸内フローラを整えエクオール産生率を高める。日本人の約50%のみがエクオール産生者。",ev:"エクオール産生と更年期症状の関連研究（Climacteric 2013）でエクオール産生者と非産生者で大豆効果に有意差があることが確認されている。",wp:"納豆・豆乳・味噌はどこのスーパーでも手に入ります。くるみはコンビニのナッツコーナーでも購入できます。百合根の代わりには「長芋」がスーパーで年で平に入る補陰食材として使えます。"},
{cat:"女性",sym:"月経過多（NGの理由）",diff:"why",q:"月経量が非常に多く経血が离紅色でサラサラしている患者さまに「避けるべき食材」として正しいのはどれですか？",choices:["生姜・唐辛子・アルコール・ターメリック・酢などの活血・温め食材","小松菜・ほうれん草などの鉄分豊富な野菜","山芋・れんこん・なつめ","豆腐・湯葉などの大豆製品"],ans:0,trad:"鮮紅色でサラサラした月経過多は「血熱証」が典型。活血化瘀（血を動かす）食材や温め食材は出血をさらに促進させる。れんこん・山芋は止血・収斂作用があり適切。清熱凉血（緑豆・スイカ）が有効。",west:"温熱刺激・アルコールは血管拡張と血液凝固抑制を引き起こし出血量を増やす。ターメリックのクルクミンには血小板凝集抑制作用があり月経過多の患者では使用量に注意が必要。",ev:"クルクミン・生姜などスパイスの血小板凝集抑制作用は薬理研究で確認されている（Thrombosis Research 2012）。",wp:"れんこんは秋冬にスーパーで購入できます。通年使いたい場合は「冷凍れんこん」が便利です。止血・収斂に働く長芋もスーパーで通年手に入ります。"},
{cat:"女性",sym:"妊���準備（葉酸）",diff:"why",q:"妊娠を希望している患者さまへの食事指導として最も根拠が強く正しいのはどれですか？",choices:["妊娠に気づいてから葉酸を摂り始めれば十分","葉酸はサプリだけで補えば食事は不要","妊娠前（少なくとも1ヶ月前）から葉酸400μg/日を意識し、緑黄色野菜・ブロッコリー・枝豆・納豆から摇取する","ビタミンAを積極的に大量に摂って赤ちゃんを守る"],ans:2,trad:"東洋医学では妊娠前から脾腎を養い「先天の精（腎精）」と「後天の精（脾胃からの栄養）」を充実させることが基本。山芋・なつめ・黒豆・緑黄色野菜で「種まき前の土壌を整える」食養が重要。",west:"葉酸は神経管锉鎖障害の予防に必須で、神経管は受紾後約28日で閉鎖するため妊娠に気づいてからでは遅い。ビタミンAのレチノール型過剰摇取は催奇形性リスクがある。",ev:"葉酸と神経管锉鎖障害予防の大規模RCT（Lancet 1991, MRC Vitamin Study）で70%のリスク低下が確認されており狾在も世界標準の推奨事項。",wp:"冷凍ブロッコリーは手軽で葉酸が豪富です。納豆＋卵を朝食の定番にするだけで葉酸・鉄・ビタミンB群がまとめて摂れます。杝豆は冷凍タイプがスーパーで通年入手できます。"},
{cat:"女性",sym:"産後の体力回復",diff:"combo",q:"出産後3ヶ月で疲労感・乳汁分泌不足・抜け毛が顕著な患者さまへの食事指導として最も適切なのはどれですか？",choices:["体重管理のために授乳中でも500kcal以上の食事制限をする","良質なタンパク賮・鉄・亜鉛・ビタミンD・DHAと補気補血食材（山芋・なつめ・黒ゴマ）を豪富に摇る","脂質を完全に排除する","生野菜サラダを中心にする（冷たくても授乳に良いため）"],ans:1,trad:"産後は「気血両虚」の典型。産後の月子食の考えで「温補気血」が基本。生冷飒食は脾胃を傷つける。山芋・なつめ・スッポン・黒ゴマは補気養血の代表食材。乳汁分泌不足には鯉・通草（食薬）も用いる。",west:"分娩による失血で鉄・葉酸が大量消耗する。授乳はカロリー・タンパク賮・DHA需要を大幅増加させる（約500kcal/日追加が必要）。脂質制限は脂溶性ビタミン吸収を低下させ産後うつリスクを高める。",ev:"産後の鉄欠乏と産後うつの関連（Biological Psychiatry 2018）、授乳中のDHA需要増加（Prostaglandins Leukotrienes and Essential Fatty Acids 2015）で確認されている。",wp:"スッポンの代わりに「鶦手羽元スープ」が手軽に作れます。長芋はスーパーで通年入手できる補気食材です。黒ゴマはすりごまタイプが使いやすく、ヨーグルトや味噌汁に混せるだけで手軽に摂れます。"},
{cat:"女性",sym:"月経痛（食のタイミング）",diff:"why",q:"月経痛の予防として、いつから食事指導を開始するのが最も効果的ですか？",choices:["月経が始まってから痛み止めと同時に食事指導を開始する","月経中だけ生姜茶を飲む","月経が終わってから次のために準備する","月経予定の7〜10日前から生姜・オメガ3・マグネシウムを意識した食事を開始し冷たいもの・アルコールを避ける"],ans:3,trad:"東洋医学では「治未病（症状が出る前に予防する）」の考えが最重要。月経前の「黄体期」から気血の流れを整える食事を意識することで「寒凝」や「気滞」を未然に防ぐことができる。",west:"プロスタグランジンの産生は月経開始前から始まる。オメガ3は前���体であるアラキドン酸の代謝を事前に調整することでPGF2α過剰産生を抑制する。マグネシウムは子宮平滑筋の緊張を事前に緩和する。",ev:"月経前からのオメガ3補充による月経痛予防効果のRCT（European Journal of Clinical Nutrition 2013）で事前介入群の有意な痛み軽減が確認されている。",wp:"サバ缶・いわし缶はオメガ3が豊富で最もコスパが良い食材です。生姜はチューブや乾燥パウダーでも代用できます。アーモンド（マグネシウム源）はコンビニの小袋が常備しやすいです。"},
{cat:"女性",sym:"PCOS傾向",diff:"combo",q:"月経不順・ニキビ・体重増加傾向がありPCOS（多嚢胞性卵巣症候群）が疑われる患者さまへの食事指導として最も適切なのはどれですか？",choices:["低GI食・食物繹（維・イノシトール（そば・いちご・柱槑）・オメガ3で血糖・インスリンを安定させる","高GI食（白米・砂糖菓子）を中心にカロリーを増やす","肉類だけを食べて糖質を極端にゼロにする","乳製品のみで栄養を補う"],ans:0,trad:"PCOSに似た症状は「脾虙时旿」「腎虚」のパターンが多い。山芋・もち麦・小豆・昆布なな健脾化痲・補腎の食材が有効。甘いもの・冷たいもの・脂っこいものは「湿」を生じさせ症状を悪化させる。",west:"PCOSはインスリン抵抗性と高インスリン血症が卵巣でのアンドロゲン過剰産生を促進する。低GI食はインスリン分泌を安定させ卵巣機能を改善する。ミオイノシトールはインスリン感受性を高めPCOS症状改善に有効。",ev:"ミオイノシトールとPCOS症状改善のRCT（European Review for Medical and Pharmacological Sciences 2013）でホルモン値・排卵機能の改善が確認されている。",wp:"もち麦はスーパーで購入でき、白米に混ぜて炊くだけでGI値が下がります。そばは乾麺タイプが便利です。みかん・グレープフルーツは通年手に入るイノシトール源です。"},
{cat:"女性",sym:"子宮内膜症（禁忌食材）",diff:"why",q:"強い月経痛（鎮痛剤が必要）と月経前後の骨盤痛がある患者さまへの「特に避けるべき食材の理由」として正しいのはどれですか？",choices:["納豆・豆腐など大豆食品は全量カットが必要","緑黄色野菜全般（ホルモンに影響する可能性）","過剰な動物性脂肪・精製糖・アルコール・トランス脂肪酸（炎症促進作用で症状を悪化させる）","水分全般（むくみ予防のため）"],ans:2,trad:"強い月経痛は「寒凝血瘀」「気滞血瘀」の重症パターン。血瘀を促進する食材（アルコール・脂肪分の多い食事）と炎症増悪食材を避けることが基本。大豆イソフラボンは現時点で適量は許容され一律禁忌ではないという点も患者指導として重要。",west:"子宮内膜症は慢性炎症疾患でプロスタグランジン・炎症性サイトカインが過剰産生される。飽和脄肪酸・粿製糖・アルコールはIL-1β・TNF-α産生を促進し症状を悪化させる。オメガ3/オメガ6比の改善が炎症抑制に重要。",ev:"食事パターンと子宮内膜症リスクの前向きコホート研究（Human Reproduction 2004）で動物性脂肪摂取量との正の相関が確認されている。",wp:"抗炎症食材として「サバ缶・いわし缶」（オメガ3豪富）と「冷凍ほうれん草・ブロッコリー」が手軽に使えます。亜麻仁油はスーパーの健康食品コーナーで購入できます。"},
{cat:"女性",sym:"更年期×骨密度",diff:"why",q:"「毎日牛乳を飲んでいるのに骨密度が下がると指摘された」という患者さまへの最も適切な追加指導はどれですか？",choices:["「牛乳のカルシウムは吸収されないので無意味」と伝える","「カルシウム吸収にはビタミンD・K2・マグネシウムが必要で、納豆・小魚・ナッツも摂ることが重要。過剰なリン（加工食品・炉酺饲料）がカルシウム吸収を阻害する」","「骨はカルシウムだけで作られるので牛乳を倍量飲めば解決」","「閉経後は何を食べても骨密度は戻らないので食事は無意味」"],ans:1,trad:"東洋医学では骨は「腎精」が主る。閉経後の腎精不足には黒ゴマ・クルミ・山芋・小魚など補腎強骨の食材が必要。ビタミンK2を豊富に含む納豆は「腎精を補い骨を固める」食材として特に重視される。",west:"カルシウム単独では骨密度改善に不十分。ビタミンDはカルシウム腸管吸収を2〜3倍に促進し、ビタミンK2はオステオカルシンを活性化して骨へのカルシウム沈着を促進する。過剰リン酸摂取はPTH分泌を促進し骨吸収を増加させる。",ev:"ビタミンK2（MK-7）と骨折リスク低下のメタ解析（Osteoporosis International 2006）、ビタミンDとカルシウム何用の骨密度改善効果（NEJM 2007）で確認されている。",wp:"「納豆（K2）＋しらす（カルシウム・D）」の組み合わせは最強の骨強化セットです。どちらもスーパーで安価に購入できます。アーモンド（マグネシウム）はコンビニの小袋が便利です。"},
{cat:"女性",sym:"冷え性×免疫（複合対策）",diff:"combo",q:"毎年冬に風邪をひきやすく、手足の冷えもひどい患者さまへの食事指導で最も適切な「複合アプローチ」はどれですか？",choices:["冷えには温め食材だけ、免疫にはビタミンCだけを別々に対処する","アイスクリームとヨーグルトで腸内環境のみを整える","カフェインで体温を上げる","生姜・ニンニク・ネ#��など温性かつ免疫強化食材と、きのこ艱（β-グルカン）・発酵食品を組み合わせて「温めながら免疫を底上げ」する"],ans:3,trad:"「冷え＋感染しやすい」は「陽虚＋衋気虚」のパターン。生姜・ネギ・ニンニクは温陽散寒と同時に衋気を固める（固表）作用がある。きのこ艱は補気強免疫の代表食材。両問題を同時に対処する「温補固表」の食事設計が東洋医学的アプローチ。",west:"低体温は好中球・NK細胞の活性を低下させ感染リスクを高める。生姜・ニンニクのアリシン・ジンゲロールは直接的な抗菌・抗ウイルス作用に加え体温を上げる。β-グルカンは自然免疫を活性化し感染抵抗性を高める。",ev:"ニンニク（アリシン）と感染症予防のRCT（Advances in Therapy 2001）、β-グルカンと上気道感染のメタ解析（Journal of the American College of Nutrition 2013）で有効性が確認されている。",wp:"チューブ生姜・チューブにんにくは常備しやすく便利です。えのき・しめじ・しいたけはスーパーで安価に手に入るβ-グルカン源です。味噌汁にきのこ類とネギを入れるだけで「温補固表」の一品になります。"},

<html lang="ja">
<head>

<title>症状別 食事指導クイズ｜成竹鍼灸整骨院グループ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f7f6f3;color:#1a1a1a;min-height:100vh;padding:16px}
#app{max-width:680px;margin:0 auto}
.hdr{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr h1{font-size:16px;font-weight:600;color:#1a1a1a}
.hdr p{font-size:12px;color:#666;margin-top:3px}
.cat-badge{font-size:11px;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:500}
.cat-w{background:#e6f7f0;color:#1a6644;border:1px solid #b3e0cd}
.cat-m{background:#fef3e2;color:#8a5a00;border:1px solid #f5d9a0}
.pb-wrap{background:#f0ede8;border-radius:99px;height:5px;margin-top:12px}
.pb{height:5px;border-radius:99px;transition:width .4s}
.pb-w{background:#1a9e70}.pb-m{background:#c87d00}
.stats{display:flex;gap:12px;margin-top:7px}
.stat{font-size:12px;color:#666}
.stat b{color:#1a1a1a;font-weight:600}
.q-card{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:18px 20px;margin-bottom:12px}
.diff-badge{font-size:11px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;font-weight:500}
.diff-combo{background:#fde8e2;color:#9b2e14;border:1px solid #f5b8a8}
.diff-bensho{background:#fef3e2;color:#8a5a00;border:1px solid #f5d9a0}
.diff-why{background:#e6f0fb;color:#1a4a8a;border:1px solid #b3ccf0}
.q-sym{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:10px;background:#f5f4f0;color:#555;margin-left:6px}
.q-num{font-size:12px;color:#888;font-weight:600;margin-bottom:6px}
.q-text{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.65;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.cbtn{display:block;width:100%;text-align:left;padding:12px 15px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13.5px;cursor:pointer;line-height:1.55;transition:background .12s,border-color .12s;font-family:inherit}
.cbtn:hover:not(:disabled){background:#f5f4f0;border-color:#bbb}
.cbtn.correct{border:2px solid #1a9e70;background:#eaf7f2;color:#0a4a30}
.cbtn.wrong{border:2px solid #d85a30;background:#fde8e2;color:#6b1a08}
.cbtn.reveal{opacity:0.4;cursor:default}
.cbtn:disabled{cursor:default}
.lbl{display:inline-block;font-size:11px;font-weight:600;padding:1px 6px;border-radius:3px;margin-right:7px;min-width:18px;text-align:center}
.la{background:#0c447c;color:#e6f1fb}.lb{background:#2d6010;color:#eaf3de}.lc{background:#633806;color:#faeeda}.ld{background:#712b13;color:#faece7}
.fb{border-radius:10px;border:1px solid #e0ddd8;overflow:hidden;margin-bottom:12px}
.fb-hdr{display:flex;align-items:center;gap:8px;padding:10px 15px;background:#f7f6f3}
.fb-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.fb-ok{background:#e6f7f0;color:#1a6644}.fb-ng{background:#fde8e2;color:#9b2e14}
.fb-title{font-size:13.5px;font-weight:600;line-height:1.45}
.exp-grid{display:grid;grid-template-columns:1fr 1fr}
.exp-col{padding:12px 15px;border-top:1px solid #e0ddd8}
.exp-col+.exp-col{border-left:1px solid #e0ddd8}
.exp-lbl{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:7px}
.el-t{background:#e6f7f0;color:#1a6644}.el-w{background:#e6f0fb;color:#1a4a8a}
.exp-text{font-size:12.5px;color:#333;line-height:1.7}
.ev-row{padding:10px 15px;border-top:1px solid #e0ddd8;font-size:12px;color:#666;line-height:1.65}
.ev-row b{color:#333;font-weight:600}
.wp-row{padding:10px 15px;border-top:1px solid #e0ddd8;background:#fffbf0;font-size:12.5px;color:#7a5200;line-height:1.7}
.wp-row b{color:#6a4400;font-weight:600}
.next-btn{width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-weight:600;transition:background .12s;font-family:inherit}
.next-btn:hover{background:#f5f4f0}
.result{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:32px 20px;text-align:center}
.rscore{font-size:56px;font-weight:700;color:#1a1a1a;line-height:1}
.rlbl{font-size:13px;color:#666;margin-top:6px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.rcard{background:#f7f6f3;border-radius:8px;padding:12px;text-align:center}
.rcard-n{font-size:24px;font-weight:700}.rcard-l{font-size:11px;color:#666;margin-top:3px}
.rmsg{font-size:14px;color:#333;line-height:1.75;margin-top:16px;padding:16px;background:#f7f6f3;border-radius:8px;text-align:left}
.restart{padding:12px 32px;border-radius:8px;border:1px solid #ccc;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer;font-weight:600;margin-top:20px;font-family:inherit;transition:opacity .12s}
.restart:hover{opacity:0.85}
.logo{text-align:center;font-size:11px;color:#aaa;margin-top:16px;padding-bottom:8px}
@media(max-width:520px){.exp-grid{grid-template-columns:1fr}.exp-col+.exp-col{border-left:none;border-top:1px solid #e0ddd8}.rgrid{grid-template-columns:1fr 1fr}}
</style>

<script>
const QS=[
{cat:"女性",sym:"冷えのぼせ",diff:"bensho",q:"手足は冷えているのに顔がのぼせる「冷えのぼせ」タイプの患者さまに最も適した食材の組み合わせはどれですか？",choices:["ラム肉＋生姜＋シナモン（強力に体を温める）","スイカ＋緑豆＋薄荷（清熱のみ集中）","山芋＋黒豆＋くるみ（補腎陽のみ）","なつめ＋クコの実＋菊花（補血しながら虚熱を清める）"],ans:3,trad:"「冷えのぼせ」は「陰虚＋血虚」または「上熱下寒」のパターン。ラム肉など強力な温め食材は上部の熱をさらに悪化させる。クコ・なつめで補血滋陰し、菊花で虚熱を清することで上熱と下寒のバランスを同時に整える。",west:"末梢血管収縮（冷え）と中枢の熱調節障害（のぼせ）が共存する状態で、エストロゲン低下期に典型的。強い末梢温め成分は中枢性の血管拡張を誘発し、のぼせを悪化させる可能性がある。",ev:"冷えのぼせの自律神経機序の研究（自律神経学会誌 2014）で末梢血管収縮と中枢性体温調節の解離が確認されている。",wp:"なつめは「ドライデーツ」（製菓コーナー）で彳用できます。クコの実はカルディや業務スーパーで入手しやすくなっています。菊花は「カモミールティー」（ティーバッグ）が手軽な代用品になります。"},
{cat:"女性",sym:"月経痛（寒凝血瘀）",diff:"bensho",q:"経血が「暗紫色でレバー状の塊が多く、温めると楽になる」月経痛の患者さまに最も適した食事㘇導はどれですか？",choices:["生姜・シナモン・どン・モン・玫瑰花・黒砂糖を用いた温経散寒・活血化瘀の食事","緑茶・ゴーヤ・セロリなど清熱食材を中心にする","カルシウムのみをサプリで補充する","オメガ6（ひまわり油）を大量に摂取する"],ans:0,trad:"「経血が暗紫色・塊あり・温めると楽」は「寒凝血瘀証」の典型。温性食材（生姜・シナモン）で寒を散らし、活血化瘀（玫瑰花・黒砂糖）で瘀血を動かすことが基本治則。清熱食材は「寒」をさらに増やし逆効果になる。",west:"子宮血管収縮と寒冷刺激がPGF2α産生と組み合わさり月経痛を悪化させる。温熱刺激は子宮の血流改善とPGF2αによる収縮緩和の両方に働く。ショウガオールは末梢循環改善と抷炎症作用を持つ。",ev:"温め療法とイブプロフェンを比較したRCT（Journal of Obstetrics and Gynaecology 2012）で同等の鎮痛効果が確認されている。",wp:"生姜はチューブタイプで十分です。玫瑰花は「ローズヒップティー」（ティーバッグ）で平軽に代用できます。黒砂糖・シナモンパウダーはスーパーの製菓コーナーで購入できます。"},
{cat:"女性",sym:"PMS（肝気鬱結）",diff:"combo",q:"月経前になるとイライラ・乳房張痛・腹部膨満感が強くなる患者さまへの食事指導として最も適切なのはどれですか？",choices:["月経前は塩分を増やして水分を保持する","月経前は赤身肉だけで鉄を補う","玫瑰花・陳皮・セロリ・アボカドなど疏肝理気の食材と、ビタミンB6・マグネシウムを意識して摂る","高カロリー食で気分を上げる"],ans:2,trad:"PMS（月経前症候群）は「肝気鬱結」が典型。月経前は肝気が盛んになりやすく気の流れが滞りやすい。玫瑰花・陳皮など理気疏肝の食材と香りの強いハーブ（ジャスミン・薄荷）の組み合わせが有効。塩分増加は浮腫・膨満感を悪化させる。",west:"ビタミンB6はドーパミン・セロトニン合成に関与しPMSの気分症状を改善する。マグネシウムは月経前の浮腫・乳房張痛・頭闛を軽減する。塩分過剰は水分貯留を促進しPMSを悪化させる。",ev:"B6とPMSのメタ解析（BMJ 1999）で気分・身体症状の改善が確認されている。マグネシウムのRCT（Obstetrics & Gynecology 1991）でも月経前症状の有意な軽減が示されている。",wp:"陳皮はみかんの皮を天日干しにしたもので手作りできます。玫瑰花は「ローズヒップティー」が代用品になります。セロリ・アボカドはスーパーで通年で購入可能です。"},
{cat:"女性",sym:"月経不順（血虚の弁証）",diff:"bensho",q:"月経周期が40日以上に延長し、経血量が少なく色が薄い。顔色が白く動悸・目のかすみもある患者さまの弁証と食事として最も正しいのはどれですか？",choices:["気滞血瘀→セロリ・ターメリック","血虚証→なつめ・クコの実・ほうれん草・レバー・黒ゴマ","湿熊下注→はとむぎ・緑豆","腎陽虚→ラム肉・シナモン・黒豆"],ans:1,trad:"「経血量少・色薄・顔白・動悸・目のかすみ」は「血虚証」の典型。補血の基本食材（なつめ・クコ・黒ゴマ・レバー）を用いる。気滞血瘀なら経血は暗紫色で善あり、腎陽虚なら強い冷え・腰の重だるさが顕著という点で区別する。",west:"鉄欠乏性貧血による月経量減少・動悸・眼精疲労はまさに血虚証と重なる。鉄・葉酸・B12不足は卵巣機能に影響し月経周期を延長させる。ヘム鉄＋ビタミンCの組み合わせで吸収率が最大化される。",ev:"鉄次乏と月経異常の関連は婦人科内分泌学会ガイドラインに明記されている。",wp:"ほうれん草・小松菜・豉レバーはスーパーで平に入る代表的な補血食材です。なつめはドライデーツ（製菓コーナー）で彳用できます。黒ゴマはすりごまタイプが使いやすくスーパーで年で凅入できます。"},
{cat:"女性",sym:"更年期（エクオール）",diff:"why",q:"毎日豆乳を飲んでいるが更年期のほてり・寝汗に効果が出ないと相請された場合の追加アドバイスとして最も適切なのはどれですか？",choices:["豆乳を倍量飲む","動物性脄肪を増やす","カフェインで眠気を抑える","納豆・味噌などの発酵大豆食品に切り替え、黒豆・山芋・くるみ・百合根を組み合わせる"],ans:3,trad:"腎陰虚証のほてり・寝汗に豆乳単独では不十分。食薬の「相須相使（相乗効果）」を意識した組み合わせが東洋医学の基本。黒豆・山芋・くるみ・百合根を複合的に用いることで滋陰補腎の効果が高まる。",west:"大豆イソフラボンはエクオールに腸内変換されることで活性化する。エクオール産生には腸内細菌が必須で、睹릵大豆食品（納豆・味噌）は腸内フローラを整えエクオール産生率を高める。日本人の約50%のみがエクオール産生者。",ev:"エクオール産生と更年期症状の関連研究（Climacteric 2013）でエクオール産生者と非産生者で大豆効果に有意差があることが確認されている。",wp:"納豆・豆乳・味噌はどこのスーパーでも手に入ります。くるみはコンビニのナッツコーナーでも購入できます。百合根の代わりには「長芋」がスーパーで年で平に入る補陰食材として使えます。"},
{cat:"女性",sym:"月経過多（NGの理由）",diff:"why",q:"月経量が非常に多く経血が离紅色でサラサラしている患者さまに「避けるべき食材」として正しいのはどれですか？",choices:["生姜・唐辛子・アルコール・ターメリック・酢などの活血・温め食材","小松菜・ほうれん草などの鉄分豊富な野菜","山芋・れんこん・なつめ","豆腐・湯葉などの大豆製品"],ans:0,trad:"鮮紅色でサラサラした月経過多は「血熱証」が典型。活血化瘀（血を動かす）食材や温め食材は出血をさらに促進させる。れんこん・山芋は止血・収斂作用があり適切。清熱凉血（緑豆・スイカ）が有効。",west:"温熱刺激・アルコールは血管拡張と血液凝固抑制を引き起こし出血量を増やす。ターメリックのクルクミンには血小板凝集抑制作用があり月経過多の患者では使用量に注意が必要。",ev:"クルクミン・生姜などスパイスの血小板凝集抑制作用は薬理研究で確認されている（Thrombosis Research 2012）。",wp:"れんこんは秋冬にスーパーで購入できます。通年使いたい場合は「冷凍れんこん」が便利です。止血・収斂に働く長芋もスーパーで通年手に入ります。"},
{cat:"女性",sym:"妊���準備（葉酸）",diff:"why",q:"妊娠を希望している患者さまへの食事指導として最も根拠が強く正しいのはどれですか？",choices:["妊娠に気づいてから葉酸を摂り始めれば十分","葉酸はサプリだけで補えば食事は不要","妊娠前（少なくとも1ヶ月前）から葉酸400μg/日を意識し、緑黄色野菜・ブロッコリー・枝豆・納豆から摇取する","ビタミンAを積極的に大量に摂って赤ちゃんを守る"],ans:2,trad:"東洋医学では妊娠前から脾腎を養い「先天の精（腎精）」と「後天の精（脾胃からの栄養）」を充実させることが基本。山芋・なつめ・黒豆・緑黄色野菜で「種まき前の土壌を整える」食養が重要。",west:"葉酸は神経管锉鎖障害の予防に必須で、神経管は受紾後約28日で閉鎖するため妊娠に気づいてからでは遅い。ビタミンAのレチノール型過剰摇取は催奇形性リスクがある。",ev:"葉酸と神経管锉鎖障害予防の大規模RCT（Lancet 1991, MRC Vitamin Study）で70%のリスク低下が確認されており狾在も世界標準の推奨事項。",wp:"冷凍ブロッコリーは手軽で葉酸が豪富です。納豆＋卵を朝食の定番にするだけで葉酸・鉄・ビタミンB群がまとめて摂れます。杝豆は冷凍タイプがスーパーで通年入手できます。"},
{cat:"女性",sym:"産後の体力回復",diff:"combo",q:"出産後3ヶ月で疲労感・乳汁分泌不足・抜け毛が顕著な患者さまへの食事指導として最も適切なのはどれですか？",choices:["体重管理のために授乳中でも500kcal以上の食事制限をする","良質なタンパク賮・鉄・亜鉛・ビタミンD・DHAと補気補血食材（山芋・なつめ・黒ゴマ）を豪富に摇る","脂質を完全に排除する","生野菜サラダを中心にする（冷たくても授乳に良いため）"],ans:1,trad:"産後は「気血両虚」の典型。産後の月子食の考えで「温補気血」が基本。生冷飒食は脾胃を傷つける。山芋・なつめ・スッポン・黒ゴマは補気養血の代表食材。乳汁分泌不足には鯉・通草（食薬）も用いる。",west:"分娩による失血で鉄・葉酸が大量消耗する。授乳はカロリー・タンパク賮・DHA需要を大幅増加させる（約500kcal/日追加が必要）。脂質制限は脂溶性ビタミン吸収を低下させ産後うつリスクを高める。",ev:"産後の鉄欠乏と産後うつの関連（Biological Psychiatry 2018）、授乳中のDHA需要増加（Prostaglandins Leukotrienes and Essential Fatty Acids 2015）で確認されている。",wp:"スッポンの代わりに「鶦手羽元スープ」が手軽に作れます。長芋はスーパーで通年入手できる補気食材です。黒ゴマはすりごまタイプが使いやすく、ヨーグルトや味噌汁に混せるだけで手軽に摂れます。"},
{cat:"女性",sym:"月経痛（食のタイミング）",diff:"why",q:"月経痛の予防として、いつから食事指導を開始するのが最も効果的ですか？",choices:["月経が始まってから痛み止めと同時に食事指導を開始する","月経中だけ生姜茶を飲む","月経が終わってから次のために準備する","月経予定の7〜10日前から生姜・オメガ3・マグネシウムを意識した食事を開始し冷たいもの・アルコールを避ける"],ans:3,trad:"東洋医学では「治未病（症状が出る前に予防する）」の考えが最重要。月経前の「黄体期」から気血の流れを整える食事を意識することで「寒凝」や「気滞」を未然に防ぐことができる。",west:"プロスタグランジンの産生は月経開始前から始まる。オメガ3は前���体であるアラキドン酸の代謝を事前に調整することでPGF2α過剰産生を抑制する。マグネシウムは子宮平滑筋の緊張を事前に緩和する。",ev:"月経前からのオメガ3補充による月経痛予防効果のRCT（European Journal of Clinical Nutrition 2013）で事前介入群の有意な痛み軽減が確認されている。",wp:"サバ缶・いわし缶はオメガ3が豊富で最もコスパが良い食材です。生姜はチューブや乾燥パウダーでも代用できます。アーモンド（マグネシウム源）はコンビニの小袋が常備しやすいです。"},
{cat:"女性",sym:"PCOS傾向",diff:"combo",q:"月経不順・ニキビ・体重増加傾向がありPCOS（多嚢胞性卵巣症候群）が疑われる患者さまへの食事指導として最も適切なのはどれですか？",choices:["低GI食・食物繹（維・イノシトール（そば・いちご・柱槑）・オメガ3で血糖・インスリンを安定させる","高GI食（白米・砂糖菓子）を中心にカロリーを増やす","肉類だけを食べて糖質を極端にゼロにする","乳製品のみで栄養を補う"],ans:0,trad:"PCOSに似た症状は「脾虙时旿」「腎虚」のパターンが多い。山芋・もち麦・小豆・昆布なな健脾化痲・補腎の食材が有効。甘いもの・冷たいもの・脂っこいものは「湿」を生じさせ症状を悪化させる。",west:"PCOSはインスリン抵抗性と高インスリン血症が卵巣でのアンドロゲン過剰産生を促進する。低GI食はインスリン分泌を安定させ卵巣機能を改善する。ミオイノシトールはインスリン感受性を高めPCOS症状改善に有効。",ev:"ミオイノシトールとPCOS症状改善のRCT（European Review for Medical and Pharmacological Sciences 2013）でホルモン値・排卵機能の改善が確認されている。",wp:"もち麦はスーパーで購入でき、白米に混ぜて炊くだけでGI値が下がります。そばは乾麺タイプが便利です。みかん・グレープフルーツは通年手に入るイノシトール源です。"},
{cat:"女性",sym:"子宮内膜症（禁忌食材）",diff:"why",q:"強い月経痛（鎮痛剤が必要）と月経前後の骨盤痛がある患者さまへの「特に避けるべき食材の理由」として正しいのはどれですか？",choices:["納豆・豆腐など大豆食品は全量カットが必要","緑黄色野菜全般（ホルモンに影響する可能性）","過剰な動物性脂肪・精製糖・アルコール・トランス脂肪酸（炎症促進作用で症状を悪化させる）","水分全般（むくみ予防のため）"],ans:2,trad:"強い月経痛は「寒凝血瘀」「気滞血瘀」の重症パターン。血瘀を促進する食材（アルコール・脂肪分の多い食事）と炎症増悪食材を避けることが基本。大豆イソフラボンは現時点で適量は許容され一律禁忌ではないという点も患者指導として重要。",west:"子宮内膜症は慢性炎症疾患でプロスタグランジン・炎症性サイトカインが過剰産生される。飽和脄肪酸・粿製糖・アルコールはIL-1β・TNF-α産生を促進し症状を悪化させる。オメガ3/オメガ6比の改善が炎症抑制に重要。",ev:"食事パターンと子宮内膜症リスクの前向きコホート研究（Human Reproduction 2004）で動物性脂肪摂取量との正の相関が確認されている。",wp:"抗炎症食材として「サバ缶・いわし缶」（オメガ3豪富）と「冷凍ほうれん草・ブロッコリー」が手軽に使えます。亜麻仁油はスーパーの健康食品コーナーで購入できます。"},
{cat:"女性",sym:"更年期×骨密度",diff:"why",q:"「毎日牛乳を飲んでいるのに骨密度が下がると指摘された」という患者さまへの最も適切な追加指導はどれですか？",choices:["「牛乳のカルシウムは吸収されないので無意味」と伝える","「カルシウム吸収にはビタミンD・K2・マグネシウムが必要で、納豆・小魚・ナッツも摂ることが重要。過剰なリン（加工食品・炉酺饲料）がカルシウム吸収を阻害する」","「骨はカルシウムだけで作られるので牛乳を倍量飲めば解決」","「閉経後は何を食べても骨密度は戻らないので食事は無意味」"],ans:1,trad:"東洋医学では骨は「腎精」が主る。閉経後の腎精不足には黒ゴマ・クルミ・山芋・小魚など補腎強骨の食材が必要。ビタミンK2を豊富に含む納豆は「腎精を補い骨を固める」食材として特に重視される。",west:"カルシウム単独では骨密度改善に不十分。ビタミンDはカルシウム腸管吸収を2〜3倍に促進し、ビタミンK2はオステオカルシンを活性化して骨へのカルシウム沈着を促進する。過剰リン酸摂取はPTH分泌を促進し骨吸収を増加させる。",ev:"ビタミンK2（MK-7）と骨折リスク低下のメタ解析（Osteoporosis International 2006）、ビタミンDとカルシウム何用の骨密度改善効果（NEJM 2007）で確認されている。",wp:"「納豆（K2）＋しらす（カルシウム・D）」の組み合わせは最強の骨強化セットです。どちらもスーパーで安価に購入できます。アーモンド（マグネシウム）はコンビニの小袋が便利です。"},
{cat:"女性",sym:"冷え性×免疫（複合対策）",diff:"combo",q:"毎年冬に風邪をひきやすく、手足の冷えもひどい患者さまへの食事指導で最も適切な「複合アプローチ」はどれですか？",choices:["冷えには温め食材だけ、免疫にはビタミンCだけを別々に対処する","アイスクリームとヨーグルトで腸内環境のみを整える","カフェインで体温を上げる","生姜・ニンニク・ネ#��など温性かつ免疫強化食材と、きのこ艱（β-グルカン）・発酵食品を組み合わせて「温めながら免疫を底上げ」する"],ans:3,trad:"「冷え＋感染しやすい」は「陽虚＋衋気虚」のパターン。生姜・ネギ・ニンニクは温陽散寒と同時に衋気を固める（固表）作用がある。きのこ艱は補気強免疫の代表食材。両問題を同時に対処する「温補固表」の食事設計が東洋医学的アプローチ。",west:"低体温は好中球・NK細胞の活性を低下させ感染リスクを高める。生姜・ニンニクのアリシン・ジンゲロールは直接的な抗菌・抗ウイルス作用に加え体温を上げる。β-グルカンは自然免疫を活性化し感染抵抗性を高める。",ev:"ニンニク（アリシン）と感染症予防のRCT（Advances in Therapy 2001）、β-グルカンと上気道感染のメタ解析（Journal of the American College of Nutrition 2013）で有効性が確認されている。",wp:"チューブ生姜・チューブにんにくは常備しやすく便利です。えのき・しめじ・しいたけはスーパーで安価に手に入るβ-グルカン源です。味噌汁にきのこ類とネギを入れるだけで「温補固表」の一品になります。"},
