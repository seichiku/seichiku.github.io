<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>症状別 食事指導クイズ｜成竹鍼灸整骨院グループ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f7f6f3;color:#1a1a1a;min-height:100vh;padding:16px}
#app{max-width:680px;margin:0 auto}
.hdr{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr h1{font-size:16px;font-weight:600;color:#1a1a1a}
.hdr p{font-size:12px;color:#666;margin-top:3px}
.cat-badge{font-size:11px;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:500}
.cat-w{background:#e6f7f0;color:#1a6644;border:1px solid #b3e0cd}
.cat-m{background:#fef3e2;color:#8a5a00;border:1px solid #f5d9a0}
.pb-wrap{background:#f0ede8;border-radius:99px;height:5px;margin-top:12px}
.pb{height:5px;border-radius:99px;transition:width .4s}
.pb-w{background:#1a9e70}.pb-m{background:#c87d00}
.stats{display:flex;gap:12px;margin-top:7px}
.stat{font-size:12px;color:#666}
.stat b{color:#1a1a1a;font-weight:600}
.q-card{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:18px 20px;margin-bottom:12px}
.diff-badge{font-size:11px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;font-weight:500}
.diff-combo{background:#fde8e2;color:#9b2e14;border:1px solid #f5b8a8}
.diff-bensho{background:#fef3e2;color:#8a5a00;border:1px solid #f5d9a0}
.diff-why{background:#e6f0fb;color:#1a4a8a;border:1px solid #b3ccf0}
.q-sym{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:10px;background:#f5f4f0;color:#555;margin-left:6px}
.q-num{font-size:12px;color:#888;font-weight:600;margin-bottom:6px}
.q-text{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.65;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.cbtn{display:block;width:100%;text-align:left;padding:12px 15px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13.5px;cursor:pointer;line-height:1.55;transition:background .12s,border-color .12s;font-family:inherit}
.cbtn:hover:not(:disabled){background:#f5f4f0;border-color:#bbb}
.cbtn.correct{border:2px solid #1a9e70;background:#eaf7f2;color:#0a4a30}
.cbtn.wrong{border:2px solid #d85a30;background:#fde8e2;color:#6b1a08}
.cbtn.reveal{opacity:0.4;cursor:default}
.cbtn:disabled{cursor:default}
.lbl{display:inline-block;font-size:11px;font-weight:600;padding:1px 6px;border-radius:3px;margin-right:7px;min-width:18px;text-align:center}
.la{background:#0c447c;color:#e6f1fb}.lb{background:#2d6010;color:#eaf3de}.lc{background:#633806;color:#faeeda}.ld{background:#712b13;color:#faece7}
.fb{border-radius:10px;border:1px solid #e0ddd8;overflow:hidden;margin-bottom:12px}
.fb-hdr{display:flex;align-items:center;gap:8px;padding:10px 15px;background:#f7f6f3}
.fb-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.fb-ok{background:#e6f7f0;color:#1a6644}.fb-ng{background:#fde8e2;color:#9b2e14}
.fb-title{font-size:13.5px;font-weight:600;line-height:1.45}
.exp-grid{display:grid;grid-template-columns:1fr 1fr}
.exp-col{padding:12px 15px;border-top:1px solid #e0ddd8}
.exp-col+.exp-col{border-left:1px solid #e0ddd8}
.exp-lbl{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:7px}
.el-t{background:#e6f7f0;color:#1a6644}.el-w{background:#e6f0fb;color:#1a4a8a}
.exp-text{font-size:12.5px;color:#333;line-height:1.7}
.ev-row{padding:10px 15px;border-top:1px solid #e0ddd8;font-size:12px;color:#666;line-height:1.65}
.ev-row b{color:#333;font-weight:600}
.wp-row{padding:10px 15px;border-top:1px solid #e0ddd8;background:#fffbf0;font-size:12.5px;color:#7a5200;line-height:1.7}
.wp-row b{color:#6a4400;font-weight:600}
.next-btn{width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-weight:600;transition:background .12s;font-family:inherit}
.next-btn:hover{background:#f5f4f0}
.result{background:#fff;border:1px solid #e0ddd8;border-radius:12px;padding:32px 20px;text-align:center}
.rscore{font-size:56px;font-weight:700;color:#1a1a1a;line-height:1}
.rlbl{font-size:13px;color:#666;margin-top:6px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.rcard{background:#f7f6f3;border-radius:8px;padding:12px;text-align:center}
.rcard-n{font-size:24px;font-weight:700}.rcard-l{font-size:11px;color:#666;margin-top:3px}
.rmsg{font-size:14px;color:#333;line-height:1.75;margin-top:16px;padding:16px;background:#f7f6f3;border-radius:8px;text-align:left}
.restart{padding:12px 32px;border-radius:8px;border:1px solid #ccc;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer;font-weight:600;margin-top:20px;font-family:inherit;transition:opacity .12s}
.restart:hover{opacity:0.85}
.logo{text-align:center;font-size:11px;color:#aaa;margin-top:16px;padding-bottom:8px}
@media(max-width:520px){.exp-grid{grid-template-columns:1fr}.exp-col+.exp-col{border-left:none;border-top:1px solid #e0ddd8}.rgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app"></div>

<script>
const QS=[
{cat:"女性",sym:"冷えのぼせ",diff:"bensho",q:"手足は冷えているのに顔がのぼせる「冷えのぼせ」タイプの患者さまに最も適した食材の組み合わせはどれですか？",choices:["ラム肉＋生姜＋シナモン（強力に体を温める）","スイカ＋緑豆＋薄荷（清熱のみ集中）","山芋＋黒豆＋くるみ（補腎陽のみ）","なつめ＋クコの実＋菊花（補血しながら虚熱を清める）"],ans:3,trad:"「冷えのぼせ」は「陰虚＋血虚」または「上熱下寒」のパターン。ラム肉など強力な温め食材は上部の熱をさらに悪化させる。クコ・なつめで補血滋陰し、菊花で虚熱を清することで上熱と下寒のバランスを同時に整える。",west:"末梢血管収縮（冷え）と中枢の熱調節障害（のぼせ）が共存する状態で、エストロゲン低下期に典型的。強い末梢温め成分は中枢性の血管拡張を誘発し、のぼせを悪化させる可能性がある。",ev:"冷えのぼせの自律神経機序の研究（自律神経学会誌 2014）で末梢血管収縮と中枢性体温調節の解離が確認されている。",wp:"なつめは「ドライデーツ」（製菓コーナー）で代用できます。クコの実はカルディや業務スーパーで入手しやすくなっています。菊花は「カモミールティー」（ティーバッグ）が手軽な代用品になります。"},
{cat:"女性",sym:"月経痛（寒凝血瘀）",diff:"bensho",q:"経血が「暗紫色でレバー状の塊が多く、温めると楽になる」月経痛の患者さまに最も適した食事指導はどれですか？",choices:["生姜・シナモン・玫瑰花・黒砂糖を用いた温経散寒・活血化瘀の食事","緑茶・ゴーヤ・セロリなど清熱食材を中心にする","カルシウムのみをサプリで補充する","オメガ6（ひまわり油）を大量に摂取する"],ans:0,trad:"「経血が暗紫色・塊あり・温めると楽」は「寒凝血瘀証」の典型。温性食材（生姜・シナモン）で寒を散らし、活血化瘀（玫瑰花・黒砂糖）で瘀血を動かすことが基本治則。清熱食材は「寒」をさらに増やし逆効果になる。",west:"子宮血管収縮と寒冷刺激がPGF2α産生と組み合わさり月経痛を悪化させる。温熱刺激は子宮の血流改善とPGF2αによる収縮緩和の両方に働く。ショウガオールは末梢循環改善と抗炎症作用を持つ。",ev:"温め療法とイブプロフェンを比較したRCT（Journal of Obstetrics and Gynaecology 2012）で同等の鎮痛効果が確認されている。",wp:"生姜はチューブタイプで十分です。玫瑰花は「ローズヒップティー」（ティーバッグ）で手軽に代用できます。黒砂糖・シナモンパウダーはスーパーの製菓コーナーで購入できます。"},
{cat:"女性",sym:"PMS（肝気鬱結）",diff:"combo",q:"月経前になるとイライラ・乳房張痛・腹部膨満感が強くなる患者さまへの食事指導として最も適切なのはどれですか？",choices:["月経前は塩分を増やして水分を保持する","月経前は赤身肉だけで鉄を補う","玫瑰花・陳皮・セロリ・アボカドなど疏肝理気の食材と、ビタミンB6・マグネシウムを意識して摂る","高カロリー食で気分を上げる"],ans:2,trad:"PMS（月経前症候群）は「肝気鬱結」が典型。月経前は肝気が盛んになりやすく気の流れが滞りやすい。玫瑰花・陳皮など理気疏肝の食材と香りの強いハーブ（ジャスミン・薄荷）の組み合わせが有効。塩分増加は浮腫・膨満感を悪化させる。",west:"ビタミンB6はドーパミン・セロトニン合成に関与しPMSの気分症状を改善する。マグネシウムは月経前の浮腫・乳房張痛・頭痛を軽減する。塩分過剰は水分貯留を促進しPMSを悪化させる。",ev:"B6とPMSのメタ解析（BMJ 1999）で気分・身体症状の改善が確認されている。マグネシウムのRCT（Obstetrics & Gynecology 1991）でも月経前症状の有意な軽減が示されている。",wp:"陳皮はみかんの皮を天日干しにしたもので手作りできます。玫瑰花は「ローズヒップティー」が代用品になります。セロリ・アボカドはスーパーで通年購入可能です。"},
{cat:"女性",sym:"月経不順（血虚の弁証）",diff:"bensho",q:"月経周期が40日以上に延長し、経血量が少なく色が薄い。顔色が白く動悸・目のかすみもある患者さまの弁証と食事として最も正しいのはどれですか？",choices:["気滞血瘀→セロリ・ターメリック","血虚証→なつめ・クコの実・ほうれん草・レバー・黒ゴマ","湿熱下注→はとむぎ・緑豆","腎陽虚→ラム肉・シナモン・黒豆"],ans:1,trad:"「経血量少・色薄・顔白・動悸・目のかすみ」は「血虚証」の典型。補血の基本食材（なつめ・クコ・黒ゴマ・レバー）を用いる。気滞血瘀なら経血は暗紫色で塊あり、腎陽虚なら強い冷え・腰の重だるさが顕著という点で区別する。",west:"鉄欠乏性貧血による月経量減少・動悸・眼精疲労はまさに血虚証と重なる。鉄・葉酸・B12不足は卵巣機能に影響し月経周期を延長させる。ヘム鉄＋ビタミンCの組み合わせで吸収率が最大化される。",ev:"鉄欠乏と月経異常の関連は婦人科内分泌学会ガイドラインに明記されている。",wp:"ほうれん草・小松菜・豚レバーはスーパーで手に入る代表的な補血食材です。なつめはドライデーツ（製菓コーナー）で代用できます。黒ゴマはすりごまタイプが使いやすくスーパーで通年購入できます。"},
{cat:"女性",sym:"更年期（エクオール）",diff:"why",q:"毎日豆乳を飲んでいるが更年期のほてり・寝汗に効果が出ないと相談された場合の追加アドバイスとして最も適切なのはどれですか？",choices:["豆乳を倍量飲む","動物性脂肪を増やす","カフェインで眠気を抑える","納豆・味噌などの発酵大豆食品に切り替え、黒豆・山芋・くるみ・百合根を組み合わせる"],ans:3,trad:"腎陰虚証のほてり・寝汗に豆乳単独では不十分。食薬の「相須相使（相乗効果）」を意識した組み合わせが東洋医学の基本。黒豆・山芋・くるみ・百合根を複合的に用いることで滋陰補腎の効果が高まる。",west:"大豆イソフラボンはエクオールに腸内変換されることで活性化する。エクオール産生には腸内細菌が必須で、発酵大豆食品（納豆・味噌）は腸内フローラを整えエクオール産生率を高める。日本人の約50%のみがエクオール産生者。",ev:"エクオール産生と更年期症状の関連研究（Climacteric 2013）でエクオール産生者と非産生者で大豆効果に有意差があることが確認されている。",wp:"納豆・豆乳・味噌はどこのスーパーでも手に入ります。くるみはコンビニのナッツコーナーでも購入できます。百合根の代わりには「長芋」がスーパーで通年手に入る補陰食材として使えます。"},
{cat:"女性",sym:"月経過多（NGの理由）",diff:"why",q:"月経量が非常に多く経血が鮮紅色でサラサラしている患者さまに「避けるべき食材」として正しいのはどれですか？",choices:["生姜・唐辛子・アルコール・ターメリック・酢などの活血・温め食材","小松菜・ほうれん草などの鉄分豊富な野菜","山芋・れんこん・なつめ","豆腐・湯葉などの大豆製品"],ans:0,trad:"鮮紅色でサラサラした月経過多は「血熱証」が典型。活血化瘀（血を動かす）食材や温め食材は出血をさらに促進させる。れんこん・山芋は止血・収斂作用があり適切。清熱凉血（緑豆・スイカ）が有効。",west:"温熱刺激・アルコールは血管拡張と血液凝固抑制を引き起こし出血量を増やす。ターメリックのクルクミンには血小板凝集抑制作用があり月経過多の患者では使用量に注意が必要。",ev:"クルクミン・生姜などスパイスの血小板凝集抑制作用は薬理研究で確認されている（Thrombosis Research 2012）。",wp:"れんこんは秋冬にスーパーで購入できます。通年使いたい場合は「冷凍れんこん」が便利です。止血・収斂に働く長芋もスーパーで通年手に入ります。"},
{cat:"女性",sym:"妊娠準備（葉酸）",diff:"why",q:"妊娠を希望している患者さまへの食事指導として最も根拠が強く正しいのはどれですか？",choices:["妊娠に気づいてから葉酸を摂り始めれば十分","葉酸はサプリだけで補えば食事は不要","妊娠前（少なくとも1ヶ月前）から葉酸400μg/日を意識し、緑黄色野菜・ブロッコリー・枝豆・納豆から摂取する","ビタミンAを積極的に大量に摂って赤ちゃんを守る"],ans:2,trad:"東洋医学では妊娠前から脾腎を養い「先天の精（腎精）」と「後天の精（脾胃からの栄養）」を充実させることが基本。山芋・なつめ・黒豆・緑黄色野菜で「種まき前の土壌を整える」食養が重要。",west:"葉酸は神経管閉鎖障害の予防に必須で、神経管は受精後約28日で閉鎖するため妊娠に気づいてからでは遅い。ビタミンAのレチノール型過剰摂取は催奇形性リスクがある。",ev:"葉酸と神経管閉鎖障害予防の大規模RCT（Lancet 1991, MRC Vitamin Study）で70%のリスク低下が確認されており現在も世界標準の推奨事項。",wp:"冷凍ブロッコリーは手軽で葉酸が豊富です。納豆＋卵を朝食の定番にするだけで葉酸・鉄・ビタミンB群がまとめて摂れます。枝豆は冷凍タイプがスーパーで通年購入できます。"},
{cat:"女性",sym:"産後の体力回復",diff:"combo",q:"出産後3ヶ月で疲労感・乳汁分泌不足・抜け毛が顕著な患者さまへの食事指導として最も適切なのはどれですか？",choices:["体重管理のために授乳中でも500kcal以上の食事制限をする","良質なタンパク質・鉄・亜鉛・ビタミンD・DHAと補気補血食材（山芋・なつめ・黒ゴマ）を豊富に摂る","脂質を完全に排除する","生野菜サラダを中心にする（冷たくても授乳に良いため）"],ans:1,trad:"産後は「気血両虚」の典型。産後の月子食の考えで「温補気血」が基本。生冷飲食は脾胃を傷つける。山芋・なつめ・スッポン・黒ゴマは補気養血の代表食材。乳汁分泌不足には鯉・通草（食薬）も用いる。",west:"分娩による失血で鉄・葉酸が大量消耗する。授乳はカロリー・タンパク質・DHA需要を大幅増加させる（約500kcal/日追加が必要）。脂質制限は脂溶性ビタミン吸収を低下させ産後うつリスクを高める。",ev:"産後の鉄欠乏と産後うつの関連（Biological Psychiatry 2018）、授乳中のDHA需要増加（Prostaglandins Leukotrienes and Essential Fatty Acids 2019）で確認されている。",wp:"スッポンの代わりに「鶏手羽元スープ」が手軽に作れます。長芋はスーパーで通年入手できる補気食材です。黒ゴマはすりごまタイプが使いやすく、ヨーグルトや味噌汁に混ぜるだけで手軽に摂れます。"},
{cat:"女性",sym:"月経痛（食のタイミング）",diff:"why",q:"月経痛の予防として、いつから食事指導を開始するのが最も効果的ですか？",choices:["月経が始まってから痛み止めと同時に食事指導を開始する","月経中だけ生姜茶を飲む","月経が終わってから次のために準備する","月経予定の7〜10日前から生姜・オメガ3・マグネシウムを意識した食事を開始し冷たいもの・アルコールを避ける"],ans:3,trad:"東洋医学では「治未病（症状が出る前に予防する）」の考えが最重要。月経前の「黄体期」から気血の流れを整える食事を意識することで「寒凝」や「気滞」を未然に防ぐことができる。",west:"プロスタグランジンの産生は月経開始前から始まる。オメガ3は前駆体であるアラキドン酸の代謝を事前に調整することでPGF2α過剰産生を抑制する。マグネシウムは子宮平滑筋の緊張を事前に緩和する。",ev:"月経前からのオメガ3補充による月経痛予防効果のRCT（European Journal of Clinical Nutrition 2013）で事前介入群の有意な痛み軽減が確認されている。",wp:"サバ缶・いわし缶はオメガ3が豊富で最もコスパが良い食材です。生姜はチューブや乾燥パウダーでも代用できます。アーモンド（マグネシウム源）はコンビニの小袋が常備しやすいです。"},
{cat:"女性",sym:"PCOS傾向",diff:"combo",q:"月経不順・ニキビ・体重増加傾向がありPCOS（多嚢胞性卵巣症候群）が疑われる患者さまへの食事指導として最も適切なのはどれですか？",choices:["低GI食・食物繊維・イノシトール（そば・いちご・柑橘）・オメガ3で血糖・インスリンを安定させる","高GI食（白米・砂糖菓子）を中心にカロリーを増やす","肉類だけを食べて糖質を極端にゼロにする","乳製品のみで栄養を補う"],ans:0,trad:"PCOSに似た症状は「脾虚痰湿」「腎虚」のパターンが多い。山芋・もち麦・小豆・昆布など健脾化痰・補腎の食材が有効。甘いもの・冷たいもの・脂っこいものは「湿」を生じさせ症状を悪化させる。",west:"PCOSはインスリン抵抗性と高インスリン血症が卵巣でのアンドロゲン過剰産生を促進する。低GI食はインスリン分泌を安定させ卵巣機能を改善する。ミオイノシトールはインスリン感受性を高めPCOS症状改善に有効。",ev:"ミオイノシトールとPCOS症状改善のRCT（European Review for Medical and Pharmacological Sciences 2013）でホルモン値・排卵機能の改善が確認されている。",wp:"もち麦はスーパーで購入でき、白米に混ぜて炊くだけでGI値が下がります。そばは乾麺タイプが便利です。みかん・グレープフルーツは通年手に入るイノシトール源です。"},
{cat:"女性",sym:"子宮内膜症（禁忌食材）",diff:"why",q:"強い月経痛（鎮痛剤が必要）と月経前後の骨盤痛がある患者さまへの「特に避けるべき食材の理由」として正しいのはどれですか？",choices:["納豆・豆腐など大豆食品は全量カットが必要","緑黄色野菜全般（ホルモンに影響する可能性）","過剰な動物性脂肪・精製糖・アルコール・トランス脂肪酸（炎症促進作用で症状を悪化させる）","水分全般（むくみ予防のため）"],ans:2,trad:"強い月経痛は「寒凝血瘀」「気滞血瘀」の重症パターン。血瘀を促進する食材（アルコール・脂肪分の多い食事）と炎症増悪食材を避けることが基本。大豆イソフラボンは現時点で適量は許容され一律禁忌ではないという点も患者指導として重要。",west:"子宮内膜症は慢性炎症疾患でプロスタグランジン・炎症性サイトカインが過剰産生される。飽和脂肪酸・精製糖・アルコールはIL-1β・TNF-α産生を促進し症状を悪化させる。オメガ3/オメガ6比の改善が炎症抑制に重要。",ev:"食事パターンと子宮内膜症リスクの前向きコホート研究（Human Reproduction 2004）で動物性脂肪摂取量との正の相関が確認されている。",wp:"抗炎症食材として「サバ缶・いわし缶」（オメガ3豊富）と「冷凍ほうれん草・ブロッコリー」が手軽に使えます。亜麻仁油はスーパーの健康食品コーナーで購入できます。"},
{cat:"女性",sym:"更年期×骨密度",diff:"why",q:"「毎日牛乳を飲んでいるのに骨密度が下がると指摘された」という患者さまへの最も適切な追加指導はどれですか？",choices:["「牛乳のカルシウムは吸収されないので無意味」と伝える","「カルシウム吸収にはビタミンD・K2・マグネシウムが必要で、納豆・小魚・ナッツも摂ることが重要。過剰なリン（加工食品・炭酸飲料）がカルシウム吸収を阻害する」","「骨はカルシウムだけで作られるので牛乳を倍量飲めば解決」","「閉経後は何を食べても骨密度は戻らないので食事は無意味」"],ans:1,trad:"東洋医学では骨は「腎精」が主る。閉経後の腎精不足には黒ゴマ・クルミ・山芋・小魚など補腎強骨の食材が必要。ビタミンK2を豊富に含む納豆は「腎精を補い骨を固める」食材として特に重視される。",west:"カルシウム単独では骨密度改善に不十分。ビタミンDはカルシウム腸管吸収を2〜3倍に促進し、ビタミンK2はオステオカルシンを活性化して骨へのカルシウム沈着を促進する。過剰リン酸摂取はPTH分泌を促進し骨吸収を増加させる。",ev:"ビタミンK2（MK-7）と骨折リスク低下のメタ解析（Osteoporosis International 2006）、ビタミンDとカルシウム併用の骨密度改善効果（NEJM 2007）で確認されている。",wp:"「納豆（K2）＋しらす（カルシウム・D）」の組み合わせは最強の骨強化セットです。どちらもスーパーで安価に購入できます。アーモンド（マグネシウム）はコンビニの小袋が便利です。"},
{cat:"女性",sym:"冷え性×免疫（複合対策）",diff:"combo",q:"毎年冬に風邪をひきやすく、手足の冷えもひどい患者さまへの食事指導で最も適切な「複合アプローチ」はどれですか？",choices:["冷えには温め食材だけ、免疫にはビタミンCだけを別々に対処する","アイスクリームとヨーグルトで腸内環境のみを整える","カフェインで体温を上げる","生姜・ニンニク・ネギなど温性かつ免疫強化食材と、きのこ類（β-グルカン）・発酵食品を組み合わせて「温めながら免疫を底上げ」する"],ans:3,trad:"「冷え＋感染しやすい」は「陽虚＋衛気虚」のパターン。生姜・ネギ・ニンニクは温陽散寒と同時に衛気を固める（固表）作用がある。きのこ類は補気強免疫の代表食材。両問題を同時に対処する「温補固表」の食事設計が東洋医学的アプローチ。",west:"低体温は好中球・NK細胞の活性を低下させ感染リスクを高める。生姜・ニンニクのアリシン・ジンゲロールは直接的な抗菌・抗ウイルス作用に加え体温を上げる。β-グルカンは自然免疫を活性化し感染抵抗性を高める。",ev:"ニンニク（アリシン）と感染症予防のRCT（Advances in Therapy 2001）、β-グルカンと上気道感染のメタ解析（Journal of the American College of Nutrition 2013）で有効性が確認されている。",wp:"チューブ生姜・チューブにんにくは常備しやすく便利です。えのき・しめじ・しいたけはスーパーで安価に手に入るβ-グルカン源です。味噌汁にきのこ類とネギを入れるだけで「温補固表」の一品になります。"},
{cat:"女性",sym:"授乳中",diff:"bensho",q:"授乳中で乳汁分泌不足を訴える患者さまへの食事指導として正しいのはどれですか？",choices:["授乳中でもダイエットのためカロリーを500kcal以上制限する","授乳中は食事よりサプリだけで栄養補給すれば十分","辛い食べ物で体を温めて母乳を増やす","良質なタンパク質・十分な水分（温かいスープ）を摂り、鯉・鶏肉・豆腐・アーモンドなど通乳食材を用いる。ストレス軽減も重要"],ans:3,trad:"東洋医学では乳汁は「気血」から化生する。「気血不足」が乳汁分泌不足の主因。補気補血の食材（鶏肉・山芋・なつめ）と通乳食材（鯉・花生・通草）が有効。ストレス（肝気鬱結）も乳汁分泌を著しく阻害する点を患者さまに伝えることが重要。",west:"乳汁産生はプロラクチン依存的でストレスホルモン（コルチゾール）はプロラクチン分泌を抑制する。母乳の約87%が水分で2〜3L/日の水分摂取が必須。カロリー制限はプロラクチン分泌を低下させ母乳量を直接減らす。",ev:"授乳中の栄養摂取と母乳量の関係は厚生労働省「授乳・離乳の支援ガイド 2019」に明記されている。",wp:"鯉の代わりに「鮭・鯛の切り身」が手軽です。豆腐入り味噌汁（わかめ・しじみ入り）は通乳・水分補給・発酵効果が一度に得られるおすすめの一品です。アーモンドはコンビニでも購入できます。"},
{cat:"女性",sym:"冷え性×便秘（組み合わせ）",diff:"combo",q:"手足が冷えて便秘がちな患者さまへの最も適した食事の組み合わせはどれですか？",choices:["冷たい牛乳＋レタス＋きゅうり（食物繊維で便秘改善）","唐辛子入り辛い食事で腸を刺激する","温かい根菜スープ（ごぼう・にんじん・さつまいも）＋ヨーグルト＋良質な植物性オイル","白米だけで胃腸を休める"],ans:2,trad:"冷え＋便秘は「陽虚・気虚による腸の推動力低下」。温性の根菜（ごぼう・人参・さつまいも）で脾陽を温めながら食物繊維を補給。発酵食品（ヨーグルト）で腸内環境を整え、良質な油が「潤腸通便（腸を潤して便通を助ける）」に働く。",west:"低体温は腸蠕動を低下させ便秘を悪化させる。冷たい食品は交感神経を亢進させ腸管運動をさらに抑制する。食物繊維＋プロバイオティクス＋適度な油脂（潤滑作用）の三位一体が最も有効。",ev:"体温と腸管蠕動の関係（Gut 2003）、プロバイオティクスと慢性便秘のメタ解析（American Journal of Clinical Nutrition 2014）で有効性が確認されている。",wp:"ごぼう・にんじん・さつまいもはスーパーで通年手に入ります。朝食にヨーグルト＋はちみつ＋オリーブオイル小さじ1を加えるだけで「潤腸通便」効果が高まります。"},
{cat:"精神・自律神経",sym:"不眠（心腎不交の弁証）",diff:"bensho",q:"「寝つけない・夜中に何度も目が覚める・夢が多い・口が渇く」患者さまの東洋医学的な弁証と最適な食事指導はどれですか？",choices:["腎陽虚→シナモン・生姜・ラム肉で強く温める","心腎不交（心火旺＋腎陰虚）→百合根・蓮の実・クコの実・黒豆でバランスを整える","脾胃虚弱→山芋・なつめ・米粥のみ","痰湿→はとむぎ・小豆だけに絞る"],ans:1,trad:"「入眠困難＋中途覚醒＋多夢＋口渇」は「心腎不交証」の典型。心火が上炎し腎水が上昇できない状態。百合根・蓮の実（清心除煩）＋クコの実・黒豆（滋補腎陰）で水火の交流を回復させる。腎陽虚の温め食材は心火をさらに助長させ逆効果。",west:"入眠困難はセロトニン・GABA系の低下と交感神経亢進が関与。中途覚醒はコルチゾールの過剰分泌・アドレナリン系の亢進が原因のことが多い。グリシン・GABA前駆体（発酵食品）・マグネシウムが有効。",ev:"グリシン摂取と睡眠質改善のRCT（Sleep and Biological Rhythms 2012）で中途覚醒減少・日中の眠気軽減が確認されている。",wp:"百合根は秋冬のスーパー野菜コーナーで手に入ります。なつめはドライデーツで代用可。蓮の実・クコの実はカルディや輸入食品店で購入できます。豆腐・豆乳も心を落ち着かせる食材として手軽に使えます。"},
{cat:"精神・自律神経",sym:"副腎疲労タイプの慢性疲労",diff:"combo",q:"長期ストレスで「朝起きられない・甘いもの・塩辛いものへの強い欲求・夕方に少し改善」がある患者さまへの食事指導として最も適切なのはどれですか？",choices:["カフェインと砂糖で一時的にエネルギーを補給する","断食で体をリセットする","塩分を全て制限する","血糖値を安定させる低GI食を規則正しく摂り、ビタミンC・B5・マグネシウムを意識する。カフェイン・砂糖は長期的には逆効果"],ans:3,trad:"甘辛への強い渇望と朝の不調は「腎気虚」「脾気虚」のサイン。山芋・黒豆・なつめ・黒ゴマなど補腎補脾の食材が有効。砂糖・カフェインは一時的に「気」を消耗させるため根本的には逆効果。",west:"HPA軸の慢性活性化により副腎が疲弊するとコルチゾール産生が不安定になる。ビタミンCは副腎に最も高濃度に存在しコルチゾール合成の補酵素。B5（パントテン酸）は副腎機能維持に必須。血糖スパイクは追加のコルチゾール分泌を引き起こし副腎をさらに疲弊させる。",ev:"ビタミンCとコルチゾール代謝の研究（European Journal of Clinical Nutrition 2001）で確認されている。",wp:"黒豆茶（ティーバッグタイプ）は手軽に飲める補腎食品です。長芋は山芋の代わりにどこのスーパーでも購入できます。ビタミンCはパプリカ・ブロッコリーで手軽に補えます。"},
{cat:"精神・自律神経",sym:"腸脳軸×うつ",diff:"why",q:"「うつっぽい気分が続き、同時に便秘・腹部膨満感もある」患者さまへの食事指導として最も適切なのはどれですか？",choices:["発酵食品・食物繊維・プレバイオティクス（ごぼう・玉ねぎ・バナナ）を積極的に摂り腸内フローラを整えることで腸脳軸を通じて気分改善を図る","精神症状と腸の症状は別々の問題なので食事では両方を同時に対処できない","腸内細菌をリセットするため抗菌食材のみに絞る","肉食だけに切り替えて腸内をシンプルにする"],ans:0,trad:"「肝気鬱結＋脾虚」は気分の落ち込みと消化器症状が同時に現れる典型パターン。「肝木克脾土」の状態。玫瑰花・陳皮で疏肝し、山芋・なつめ・発酵食品で健脾することで精神と消化器の両方を同時に改善できる。",west:"体内セロトニンの約90%は腸で産生される。腸内細菌叢は腸管神経系を通じて迷走神経→脳へシグナルを送る（腸脳軸）。短鎖脂肪酸産生菌が多い腸内環境ほど気分症状が改善される傾向がある。",ev:"プロバイオティクス投与とうつ症状改善のメタ解析（Nutritional Neuroscience 2019）で有意な気分改善が確認されている。腸脳軸と気分の神経経路（Cell 2015）でも解明されている。",wp:"玉ねぎ・ごぼう・バナナ・納豆・ヨーグルトはどこのスーパーでも手に入ります。これらを毎日の食事に1〜2品加えるだけで腸内フローラが改善し始めます。"},
{cat:"精神・自律神経",sym:"過換気・動悸（NGの理由）",diff:"why",q:"緊張すると動悸・息苦しさ・手足のしびれが出る患者さまへの食事指導で「カフェインを避けるべき理由」として最も正確なのはどれですか？",choices:["カフェインはカロリーが高く太るから","カフェインは胃を傷つけるから","カフェインはアデノシン受容体を遮断し交感神経を亢進させるとともに、マグネシウムの尿中排泄を増加させ神経筋の過興奮性を高めるから","カフェインは血圧を下げすぎるから"],ans:2,trad:"動悸・息苦しさは「心気虚」「心血虚」または「肝気鬱結から気上逆」が生じているパターン。なつめ・ゆり根・龍眼肉など養心安神の食材が有効。刺激物（コーヒー・アルコール・唐辛子）は気機をさらに乱すため禁忌。",west:"カフェインはアデノシン（鎮静性神経伝達物質）の受容体を遮断し中枢神経系を興奮させる。同時に腎尿細管からのマグネシウム再吸収を抑制しマグネシウム欠乏を促進する。マグネシウム欠乏は神経筋の過興奮性を高めパニック様症状を悪化させる。",ev:"マグネシウムと不安・パニック症状のメタ解析（Nutrients 2017）、カフェインと不安障害の関連（Comprehensive Psychiatry 2017）で確認されている。",wp:"マグネシウム補給にはアーモンド（コンビニ小袋）・バナナ・ほうれん草・豆腐がスーパーで手軽に購入できます。カフェインの代わりにルイボスティーやほうじ茶（カフェイン少）がおすすめです。"},
{cat:"精神・自律神経",sym:"胃不和則臥不安",diff:"why",q:"「胃がもたれると眠れない」という患者さまへの指導で、最も根拠のある答えはどれですか？",choices:["「胃の問題と睡眠は別々に対処する」と伝える","「胃不和則臥不安の考えに基づき、夕食は就寝3時間前までに終え量を腹七〜八分目にし消化しやすい温かい食事にする」と伝える","「就寝直前に大量の夜食を食べれば安眠できる」と伝える","「昼食を抜いて夕食だけ食べる」と勧める"],ans:1,trad:"「胃不和則臥不安（胃の調和が乱れると横になって眠れない）」は古典『内経』にある言葉。脾胃の「食積」や「胃気不和」が心神を乱す。夕食の量と質の管理は不眠治療の根本的な基本で、消化を助ける発酵食品（味噌・納豆）も夕食に組み込む。",west:"食後の消化活動は自律神経の副交感神経優位を妨げる。胃食道逆流症（GERD）は睡眠を断片化させる。高脂肪食は胃排出を遅らせ深部体温の低下を妨げ睡眠の質を低下させる。",ev:"夕食タイミングと睡眠の質の関連（Journal of Clinical Sleep Medicine 2011）、GERDと睡眠障害の関連（Sleep Medicine Reviews 2016）で確認されている。",wp:"夕食には「豆腐の味噌汁＋卵かけご飯（少量）」など消化が良く温かいものを選びましょう。市販のインスタント味噌汁に豆腐や長芋を足すだけで手軽に脾胃を整える夕食になります。"},
{cat:"精神・自律神経",sym:"ストレス×砂糖欲求",diff:"why",q:"ストレスが多い日ほど「甘いものがやめられない」という患者さまへの食事指導で、根拠のある対策はどれですか？",choices:["「意志力の問題なので気合いで我慢する」と伝える","砂糖の代わりに人工甘味料を大量に使う","間食をすべて禁止する","コルチゾール上昇が血糖を乱し砂糖欲求を引き起こすため、低GI間食（ナッツ・チーズ・ゆで卵）に切り替えクロム・マグネシウムを意識する"],ans:3,trad:"甘味への強い渇望は「脾気虚」のサイン（脾は甘味を好む）。山芋・さつまいも・かぼちゃなど自然な甘味の食材で脾を養い砂糖への過剰な欲求を軽減できる。「意志力でなく体質からアプローチする」という視点は患者指導で非常に重要。",west:"コルチゾール分泌は肝臓での糖新生を促進し血糖を上昇させ、その後のインスリン過剰分泌による血糖低下が甘味欲求を生む。低GI間食で血糖を安定させることが欲求サイクルを断ち切る鍵。人工甘味料は腸内細菌叢に悪影響を与え血糖調節を乱す可能性がある。",ev:"コルチゾールと食欲・砂糖欲求の関係（Psychoneuroendocrinology 2011）、人工甘味料と腸内細菌叢の影響（Nature 2014）で確認されている。",wp:"コンビニの小袋ナッツ・個包装チーズ・ゆで卵は手軽な低GI間食の定番です。カカオ72%以上の高カカオチョコレート（一口サイズ）もマグネシウム補給になります。どこのスーパーでも購入できます。"},
{cat:"精神・自律神経",sym:"IBS×ストレス",diff:"combo",q:"ストレスがかかると下痢・便秘を繰り返すIBS傾向の患者さまへの食事指導として最も適切なのはどれですか？",choices:["低FODMAPs食を意識しながら腸溶性プロバイオティクス・食事の規則性・ストレス管理も併せて指導する","高FODMAPs食（乳糖・フルクタン含有食品）を積極的に摂る","脂肪分のない食事のみにする","水分を控える"],ans:0,trad:"IBS（ストレス性下痢・便秘交互）は「肝脾不和（肝気が脾を犯す）」の典型。疏肝健脾（玫瑰花・陳皮・山芋・薏苡仁）の食事と食事の規則性・腹を冷やさないことが基本。ストレス軽減（疏肝）と脾胃強化（健脾）を同時に行うことが重要。",west:"IBS患者の内臓過敏性はCRH（コルチコトロピン放出ホルモン）を介したストレス応答と密接に関連する。FODMAPs（発酵性オリゴ糖・二糖・単糖・ポリオール）は小腸で吸収されにくく腸内細菌に発酵されガス・腹痛を引き起こす。",ev:"低FODMAP食のIBS症状改善のRCT（Gut 2014）で75%の患者に症状改善が確認されている。プロバイオティクスとIBSのメタ解析（World Journal of Gastroenterology 2014）でも有効性が示されている。",wp:"長芋・人参・ほうれん草・鶏肉・白米はスーパーで買えるFODMAPs低めの食材です。プロバイオティクスはR-1等の市販ヨーグルトで代用できます。陳皮はみかんの皮を干したものでも手作りできます。"},
{cat:"精神・自律神経",sym:"バーンアウト（燃え尽き）",diff:"bensho",q:"「頑張りすぎて何もやる気が出なくなった」バーンアウト患者さまへの東洋医学的弁証と食事指導として最も適切なのはどれですか？",choices:["さらに栄養ドリンク・カフェインで乗り切ることを勧める","断食で胃腸を休めてエネルギーを節約する","腎精枯渇＋気陰両虚のパターン→黒豆・山芋・クコの実＋B群・マグネシウム・良質なタンパク質で神経系と精気を回復","高脂肪食で一気にエネルギーを補充する"],ans:2,trad:"バーンアウトは「腎精枯渇＋気陰両虚」の状態。生命の根本エネルギーである「腎精」が消耗しきっている。強い刺激（カフェイン等）はさらに精気を消耗させる。補腎益精（黒豆・山芋・スッポン・クコ）の食薬で根本から回復を図る。",west:"慢性ストレスにより前頭前皮質の神経可塑性が低下し意欲・認知機能が障害される。この状態でのカフェイン過剰摂取はHPA軸をさらに刺激し回復を遅らせる。マグネシウム・B6はGABA合成を促進し神経系の過興奮を鎮める。",ev:"バーンアウトとHPA軸機能不全の関係（Psychosomatic Medicine 2005）、マグネシウムと神経疲労回復の研究（Magnesium Research 2010）で確認されている。",wp:"長芋・くるみはスーパーで通年購入できます。「黒豆茶」（ティーバッグタイプ）は手軽に飲める補腎食品です。クコの実の代わりに「冷凍ブルーベリー」も抗酸化・滋陰に使える代用品です。"},
{cat:"精神・自律神経",sym:"季節性うつ（ビタミンD）",diff:"combo",q:"冬になると気分が落ち込む・眠気が強い・炭水化物への欲求が増す患者さまへの食事指導として最も適切なのはどれですか？",choices:["冬はエネルギー消費が増えるので炭水化物をさらに増やす","ビタミンD（きくらげ・鮭・いわし）＋トリプトファン（バナナ・大豆・乳製品）でセロトニンを補給し適度な日光浴を心がける","カフェインで眠気を覚ます","アルコールで気分を上げる"],ans:1,trad:"東洋医学では冬は「腎」の季節で腎気が内守する時期。冬の気分低下は「心陽虚」「腎精不足」のパターンが多い。なつめ・山芋・龍眼肉・くるみなど補腎養心の食材が有効。日光（自然の陽気）を積極的に摂ることも推奨される。",west:"季節性感情障害（SAD）は日照時間の減少によるビタミンD低下とセロトニン産生低下が主因。ビタミンDはセロトニン合成酵素（TPH2）の転写を活性化する。炭水化物への渇望はセロトニン不足の代償行動として生じる。",ev:"ビタミンD補充とSAD症状改善のRCT（Journal of Nutrition 2014）、ビタミンDとセロトニン合成の分子メカニズム（FASEB Journal 2015）で確認されている。",wp:"乾燥きくらげはスーパーの乾物コーナーで安価に購入でき、ビタミンD含量が非常に高いです。鮭の切り身・いわし缶は手軽なD＆DHA源です。くるみはコンビニでも購入できます。"},
{cat:"精神・自律神経",sym:"起立性調節障害",diff:"why",q:"起き上がると立ちくらみ・頭痛がし午前中に調子が悪い患者さまへの食事指導として最も適切なのはどれですか？",choices:["朝食を抜いて昼食・夕食だけにする","朝にコーヒーを3杯飲んで目を覚ます","夜食をしっかり食べて翌日の朝食は抜く","水分（1.5〜2L/日）と適度な塩分補給を心がけ、鉄・葉酸・B12を含む朝食を必ず摂る。カフェイン依存は避ける"],ans:3,trad:"起立性調節障害的症状は「気血両虚」「心血虚」が多い。朝食で気血を補充することが一日の「陽気の昇発」を助ける。なつめ・クコ・ほうれん草・卵など補気補血の朝食が推奨される。カフェインは一時的に「気」を上げるだけで根本解決にならない。",west:"起立性低血圧は自律神経による血圧調節障害で、水分・塩分不足が最大の増悪因子。朝食欠食は血糖低下と交感神経機能低下を招き症状を悪化させる。鉄欠乏性貧血は起立時の脳血流をさらに低下させる。",ev:"起立性調節障害への非薬物療法として水分・塩分摂取増加が日本小児心身医学会ガイドライン（2015）で第一選択として推奨されている。",wp:"あさりの缶詰は鉄・ビタミンB12が豊富でパスタや味噌汁に手軽に使えます。小松菜はほうれん草よりシュウ酸が少なく鉄の吸収率が高く、スーパーで安価に入手できます。"},
{cat:"精神・自律神経",sym:"ストレス×抜け毛",diff:"why",q:"強いストレスが続いた2〜3ヶ月後から抜け毛が急増した患者さまへの説明と対策として最も正確なのはどれですか？",choices:["「コルチゾール上昇で休止期脱毛が誘発されます。亜鉛・鉄・ビオチン・タンパク質の補給と、コルチゾールを下げるマグネシウム・B群が重要です」","「ストレスと抜け毛は無関係なので食事で対処できない」","「シャンプーを変えれば改善します」","「糖質をゼロにすれば毛が生えます」"],ans:0,trad:"ストレスによる抜け毛は「腎精不足＋気血両虚」。ストレスは「肝気鬱結→気滞血瘀→頭部の血流障害→毛根への栄養供給低下」というメカニズムで抜け毛を引き起こす。黒ゴマ・クルミ・山芋・なつめ・クコで補腎益精・補血する。",west:"強いストレスによるコルチゾール上昇は毛包を成長期から休止期へ移行させる（ストレス誘発性休止期脱毛）。ストレスから2〜3ヶ月後の発現が典型。亜鉛はコルチゾール代謝と毛母細胞の増殖に必須。マグネシウムはHPA軸を調整しコルチゾール過剰を抑制する。",ev:"ストレスと休止期脱毛のメカニズム（Science 2021）、亜鉛欠乏と脱毛の関連（Dermatology 2013）で確認されている。",wp:"黒ゴマペースト（ねりごま）はスーパーで購入でき、トーストやヨーグルトに混ぜるだけで手軽に補腎できます。くるみはコンビニでも購入でき、牡蠣水煮缶は亜鉛の宝庫です。"},
{cat:"精神・自律神経",sym:"睡眠の質（トリプトファン経路）",diff:"combo",q:"「眠れないわけではないが眠りが浅く朝すっきり起きられない」患者さまへの食事指導として最も正確なのはどれですか？",choices:["夜にカフェインを摂ってすっきりした状態で寝る","就寝前に高タンパク高脂肪食を摂る","夕食にトリプトファン含有食材（大豆・バナナ・乳製品）＋炭水化物を摂り、変換に必要なB6・ナイアシン・マグネシウムを意識する","夕食を完全に抜く"],ans:2,trad:"浅い睡眠・早朝覚醒は「心陰虚」「肝血虚」のサイン。なつめ・ゆり根・蓮の実・桑の実など清心養血の食材とともに夕食の質と量を整えることが根本的アプローチ。トリプトファンを含む食材は東洋医学の「清心除煩」食材と大きく重なる。",west:"トリプトファンはセロトニン→N-アセチルセロトニン→メラトニンへと変換される。この変換にはB6・ナイアシン・マグネシウムが補酵素として必須。炭水化物と組み合わせることでインスリン分泌によりトリプトファンの脳への相対的割合が増加する。",ev:"トリプトファン摂取とメラトニン産生の代謝経路研究（Journal of Nutritional Biochemistry 2016）、マグネシウムと睡眠の質のRCT（Journal of Research in Medical Sciences 2012）で確認されている。",wp:"就寝1〜2時間前に「ホットミルク＋はちみつ小さじ1」が手軽なトリプトファン＋炭水化物の組み合わせです。バナナ1本もトリプトファン補給に最適で、コンビニでも購入できます。"},
{cat:"精神・自律神経",sym:"うつ×食事パターン",diff:"combo",q:"うつ症状のある患者さまの食歴が「パン・麺類・お菓子中心で野菜・魚はほとんど食べない」でした。最も重要な食事改善の優先順位として正しいのはどれですか？",choices:["まず砂糖だけをやめる","オメガ3（青魚週2〜3回）・葉酸（緑黄色野菜）・食物繊維・発酵食品（味噌・納豆）を優先的に増やし精製糖・超加工食品を段階的に減らす「和食・地中海食スタイル」へ移行する","プロテインシェイクだけで栄養を補う","カロリーを50%カットする"],ans:1,trad:"「脾胃の気が足りず後天の精が産生できない」状態。精製食品中心の食事は「脾胃虚弱＋湿邪」を招く。和食スタイル（発酵食品・野菜・魚）は脾胃を養い気血を産生する最適な食事パターンで東洋医学の食養観と完全に一致する。",west:"超加工食品（UPF）中心の食事パターンはうつ病リスクを最大33%増加させることが示されている。地中海食はうつ病予防・症状改善のエビデンスが最も豊富な食事パターン。腸内細菌叢の多様性は精製糖・超加工食品で著しく低下する。",ev:"食事パターンとうつ病の関連メタ解析（Molecular Psychiatry 2019）、地中海食とうつ病のRCT「SMILES trial」（BMC Medicine 2017）で有意な症状改善が確認されている。",wp:"サバ缶は1缶でEPA・DHA約2gが摂れる最高コスパのオメガ3源です。納豆＋小松菜＋卵の朝食セットを習慣化するだけで葉酸・B12・発酵食品・鉄が一度に摂れます。"},
{cat:"精神・自律神経",sym:"時間栄養学×自律神経",diff:"why",q:"自律神経が乱れやすい患者さまへの「食事のタイミング・規則性」に関する指導として最も重要なのはどれですか？",choices:["「食事時刻を毎日同じにすることが体内時計を整え自律神経リズムを安定させる。特に朝食は必ず摂り夕食は就寝3時間前までに終えること」","「好きな時間に好きなものを食べれば自律神経は整う」","「断食日を週2〜3回設けて胃腸を休める」","「夜食をしっかり食べて翌日の朝食は抜く」"],ans:0,trad:"「食飲有節（食事は節度をもって規則正しく）」は『内経』の養生基本原則。食事の規則性が脾胃の「升清降濁」のリズムを整え、気血の産生と自律神経バランスを安定させる。不規則な食事は「脾胃の気機を乱す」として古典から一貫して戒められている。",west:"食事タイミングは末梢時計遺伝子（CLOCK, BMAL1）の発現を調節し体内時計を同期させる。朝食摂取は副交感神経→交感神経への切り替えを促進し日中の自律神経活動を安定させる。不規則な食事時刻は「社会的時差ぼけ」を引き起こし自律神経リズムを乱す。",ev:"時間栄養学と自律神経の関係（Journal of Physiology 2016）、朝食摂取と心拍変動（Chronobiology International 2018）で規則正しい食事の自律神経安定効果が確認されている。",wp:"インスタント味噌汁＋バナナだけでも朝食として成立します。「何を食べるか」より「毎日同じ時間に食べること」が最も大切です。内容が簡単でも時間を固定することから始めましょう。"},
{cat:"精神・自律神経",sym:"朝の食事ルーティン",diff:"combo",q:"自律神経を整えるための「理想的な朝の食事ルーティン」として最も適切な組み合わせはどれですか？",choices:["コーヒー1杯だけで朝食を済ませる（カフェインで交感神経を起動）","起床直後に冷水を大量に飲む（胃腸を刺激して目覚める）","起床後1時間以内に温かい汁物（味噌汁）＋タンパク質（卵・納豆）＋複合炭水化物（玄米・全粒粉パン）を摂り体内時計のスイッチを入れる","朝食は昼まで我慢して胃腸を休ませる（オートファジー促進のため）"],ans:2,trad:"東洋医学では朝は「陽気の昇発」の時間。温かい汁物（特に温かい味噌汁）は脾胃を温め気の昇発を助ける。朝食で「後天の精」を補充することが一日の活動の土台となる。生冷飲食（冷たい飲み物・食べ物）は朝の「陽気」を損傷させる。",west:"朝食摂取は末梢時計遺伝子（特に肝臓・消化管の時計）をリセットし体内時計を同期させる。タンパク質は朝のドーパミン・セロトニン産生を促進する。複合炭水化物は血糖を安定させ午前中の集中力・自律神経機能を安定させる。コーヒー単独では栄養的リセット効果が得られない。",ev:"朝食タイミングと体内時計の同期（Proceedings of the National Academy of Sciences 2019）、朝食の質と自律神経活動の関係（Chronobiology International 2018）で確認されている。",wp:"卵・納豆・インスタント味噌汁の組み合わせは最も手軽な朝食セットです。全粒粉パン（スーパーのパンコーナー）や前夜に炊いておいたもち麦入り白米を電子レンジで温めるだけで完成します。"}
];
const LABS=["A","B","C","D"],LCLS=["la","lb","lc","ld"],DLABELS={combo:"食材の組み合わせ",bensho:"弁証タイプ識別",why:"NGの理由を問う"},DCLS={combo:"diff-combo",bensho:"diff-bensho",why:"diff-why"},CPBCLS={女性:"pb-w","精神・自律神経":"pb-m"},CCLS={女性:"cat-w","精神・自律神経":"cat-m"};
let cur=0,score=0,answered=false;
function render(){
  const app=document.getElementById("app");
  if(cur>=QS.length){renderResult(app);return;}
  const q=QS[cur],pct=Math.round((cur/QS.length)*100);
  app.innerHTML=`<div class="hdr"><div class="hdr-top"><div><h1>症状別 食事指導クイズ</h1><p>女性の症状 / 精神・自律神経　各問に買いやすい食材ワンポイント付き</p></div><span class="cat-badge ${CCLS[q.cat]||"cat-w"}">${q.cat}</span></div><div class="pb-wrap"><div class="pb ${CPBCLS[q.cat]||"pb-w"}" style="width:${pct}%"></div></div><div class="stats"><span class="stat"><b>${cur}</b>/${QS.length}問</span><span class="stat" style="margin-left:10px">正解 <b id="sc">${score}</b>問</span></div></div><div class="q-card"><div class="q-num">第${cur+1}問</div><span class="diff-badge ${DCLS[q.diff]}">${DLABELS[q.diff]}</span><span class="q-sym">${q.sym}</span><div class="q-text">${q.q}</div><div class="choices" id="choices">${q.choices.map((c,i)=>`<button class="cbtn" onclick="choose(${i})"><span class="lbl ${LCLS[i]}">${LABS[i]}</span>${c}</button>`).join("")}</div><div id="feedback"></div><button class="next-btn" id="nb" style="display:none" onclick="next()">${cur+1<QS.length?"次の問題へ →":"結果を見る →"}</button></div>`;
}
function choose(i){
  if(answered)return;answered=true;
  const q=QS[cur],ok=i===q.ans;if(ok)score++;
  document.querySelectorAll(".cbtn").forEach((b,idx)=>{b.disabled=true;if(idx===q.ans)b.classList.add("correct");else if(idx===i&&!ok)b.classList.add("wrong");else b.classList.add("reveal");});
  document.getElementById("feedback").innerHTML=`<div class="fb"><div class="fb-hdr"><div class="fb-icon ${ok?"fb-ok":"fb-ng"}">${ok?"✓":"✗"}</div><div class="fb-title" style="color:${ok?"#0a4a30":"#6b1a08"}">${ok?"正解！":"不正解。正解は「"+LABS[q.ans]+": "+q.choices[q.ans]+"」"}</div></div><div class="exp-grid"><div class="exp-col"><div class="exp-lbl el-t">🌿 東洋医学的解説</div><div class="exp-text">${q.trad}</div></div><div class="exp-col"><div class="exp-lbl el-w">⚕ 西洋医学的解説</div><div class="exp-text">${q.west}</div></div></div><div class="ev-row"><b>根拠・エビデンス：</b>${q.ev}</div><div class="wp-row"><b>🛒 ワンポイント（スーパー・コンビニで買えるもの）：</b>${q.wp}</div></div>`;
  document.getElementById("nb").style.display="block";
}
function next(){answered=false;cur++;render();}
function renderResult(app){
  const pct=Math.round((score/QS.length)*100);
  let msg=pct>=90?"素晴らしい！東洋・西洋両面から患者さまへ具体的な食材提案ができます。":pct>=70?"よくできました！苦手な弁証タイプの解説をもう一度確認しておきましょう。":pct>=50?"基礎はあります！東洋医学の証タイプと西洋医学のメカニズムを紐付けて復習しましょう。":"まだ伸びしろ十分です！各問のワンポイントも参考に食材と症状の結びつきを覚えましょう。";
  app.innerHTML=`<div class="result"><div class="rscore">${score}<span style="font-size:24px;font-weight:400;color:#666"> / ${QS.length}</span></div><div class="rlbl">正解数</div><div class="rgrid"><div class="rcard"><div class="rcard-n">${pct}%</div><div class="rcard-l">正答率</div></div><div class="rcard"><div class="rcard-n">${score}</div><div class="rcard-l">正解</div></div><div class="rcard"><div class="rcard-n">${QS.length-score}</div><div class="rcard-l">不正解</div></div></div><div class="rmsg">${msg}</div><button class="restart" onclick="restart()">もう一度チャレンジ</button></div>`;
}
function restart(){cur=0;score=0;answered=false;render();}
render();
</script>
</body>
</html>
